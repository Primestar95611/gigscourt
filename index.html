//  ① handleFirebaseSignup  — LIVE
//    Creates Auth user + Firestore doc + sends email verification
//    + triggers owner Resend alert.
// ════════════════════════════════════════════════════════════
async function handleFirebaseSignup(email, password, displayName) {
  const cred = await auth.createUserWithEmailAndPassword(email, password);
  // Set Auth displayName to 'GigsCourt' — this is what appears as the sender name
  // in Firebase transactional emails, which dramatically reduces spam-folder delivery.
  // The provider's real name is stored only in Firestore.
  await cred.user.updateProfile({ displayName: 'GigsCourt' });

  // Send Firebase email verification — link returns to Vercel app
  await cred.user.sendEmailVerification({
    url: APP_URL,
    handleCodeInApp: false,
  });
  console.log('[Firebase Auth] Verification email sent to:', email);

  // Write provider profile to Firestore (real name stored here)
  await db.collection('providers').doc(cred.user.uid).set({
    name:          displayName,
    service:       'New Provider',
    rating:        5.0,
    reviews:       0,
    distance:      0.5,
    available:     true,
    avatar:        `https://i.pravatar.cc/300?u=${cred.user.uid}`,
    cover:         'https://images.unsplash.com/photo-1521791136064-7986c2920216?w=600&q=80',
    bio:           'Tell clients about your services…',
    portfolio:     [],
    price:         'TBD',
    emailVerified: false,
    mfaEnrolled:   false,
    signupMethod:  'email',
    createdAt:     firebase.firestore.FieldValue.serverTimestamp(),
  });

  // Owner alert — New Email Signup
  sendOwnerAlert(
    `🎉 New Provider Signup: ${displayName}`,
    `<b>${displayName}</b> (<a href="mailto:${email}">${email}</a>) just signed up via email.<br/>UID: <code>${cred.user.uid}</code>`
  );

  console.log('[Firebase Auth] Signup OK:', cred.user.uid);
  return cred.user;
}

// ════════════════════════════════════════════════════════════
//  ④ handleEmailChange  — LIVE
//    Changes the authenticated user's email in Firebase Auth.
//    Firebase automatically sends an "Email Address Change"
//    notification to the OLD address (configured in console).
// ════════════════════════════════════════════════════════════
async function handleEmailChange(user, newEmail, currentPassword) {
  // Re-authenticate first (required by Firebase before sensitive ops)
  const credential = firebase.auth.EmailAuthProvider.credential(user.email, currentPassword);
  await user.reauthenticateWithCredential(credential);

  // verifyBeforeUpdateEmail sends a verify link to the NEW address
  // before swapping it — uses Vercel return URL
  await user.verifyBeforeUpdateEmail(newEmail, {
    url: APP_URL,
    handleCodeInApp: false,
  });
  console.log('[Firebase Auth] Email change verification sent to:', newEmail);
}

// ════════════════════════════════════════════════════════════
//  ⑤ handlePhoneSignup  — LIVE
//    Uses Firebase RecaptchaVerifier + signInWithPhoneNumber.
//    RecaptchaVerifier renders into #recaptcha-container (invisible).
// ════════════════════════════════════════════════════════════
let _recaptchaVerifier = null;
let _phoneConfirmation = null;

// Clears the reCAPTCHA widget — call this from every .catch() block so
// the user can retry without a page refresh.
function safeResetRecaptcha() {
  if (_recaptchaVerifier) {
    try { _recaptchaVerifier.clear(); } catch(e) {}
    _recaptchaVerifier = null;
  }
  if (window.grecaptcha) {
    try { window.grecaptcha.reset(); } catch(e) {}
  }
  console.log('[reCAPTCHA] Cleared — ready for next attempt');
}

async function initRecaptcha() {
  // Reuse the existing verifier if it is already rendered and healthy.
  // Only create a new one when none exists (or after safeResetRecaptcha clears it).
  // This prevents the "already rendered" error when the button is clicked again.
  if (_recaptchaVerifier) {
    console.log('[reCAPTCHA] Reusing existing verifier');
    return _recaptchaVerifier;
  }
  _recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
    size: 'invisible',
    callback: () => console.log('[reCAPTCHA] Solved'),
    'expired-callback': () => {
      // Verifier expired — clear it so the next call re-creates it fresh
      safeResetRecaptcha();
    },
  });
  await _recaptchaVerifier.render();
  console.log('[reCAPTCHA] New verifier rendered');
  return _recaptchaVerifier;
}

// phoneNumber MUST be E.164 format, e.g. +2348012345678
async function handlePhoneSendOTP(phoneNumber) {
  if (!phoneNumber.startsWith('+')) {
    throw new Error('Phone number must start with + (E.164 format)');
  }
  const verifier = await initRecaptcha();
  _phoneConfirmation = await auth.signInWithPhoneNumber(phoneNumber, verifier);
  console.log('[Firebase Auth] OTP sent to:', phoneNumber);
  return _phoneConfirmation;
}

async function handlePhoneVerifyOTP(otp, displayName) {
  if (!_phoneConfirmation) throw new Error('No active OTP session. Send OTP first.');
  const cred = await _phoneConfirmation.confirm(otp);
  const user  = cred.user;

  // Update display name if provided
  if (displayName) await user.updateProfile({ displayName });

  // Upsert provider doc
  const ref  = db.collection('providers').doc(user.uid);
  const snap = await ref.get();
  if (!snap.exists) {
    await ref.set({
      name:         displayName || user.phoneNumber,
      service:      'New Provider',
      rating:       5.0,
      reviews:      0,
      distance:     0.5,
      available:    true,
      avatar:       `https://i.pravatar.cc/300?u=${user.uid}`,
      cover:        'https://images.unsplash.com/photo-1521791136064-7986c2920216?w=600&q=80',
      bio:          'Tell clients about your services…',
      portfolio:    [],
      price:        'TBD',
      mfaEnrolled:  false,
      signupMethod: 'phone',
      phoneNumber:  user.phoneNumber,
      createdAt:    firebase.firestore.FieldValue.serverTimestamp(),
    });
  }

  // Owner alert — New Phone Signup
  sendOwnerAlert(
    `📱 New Provider Signup: ${displayName || user.phoneNumber}`,
    `<b>${displayName || 'Unknown'}</b> (${user.phoneNumber}) just signed up via <b>Phone SMS</b>.<br/>UID: <code>${user.uid}</code>`
  );

  console.log('[Firebase Auth] Phone signup OK:', user.uid);
  return user;
}

// ════════════════════════════════════════════════════════════
//  ⑥ handleMFAEnroll  — LIVE
//    Enrolls a TOTP / phone second factor on the authenticated user.
//    Uses phone verification (same flow as phone signup) as the
//    second factor.  After success, updates Firestore and sends
//    owner alert + triggers the MFA Enrollment Notification template
//    (Firebase sends this automatically on enrollment).
// ════════════════════════════════════════════════════════════
async function handleMFAEnroll(user, phoneNumber) {
  // Step 1: Get multi-factor session from Firebase
  const session = await user.multiFactor.getSession();

  // Step 2: Send OTP to the phone number, linked to the MFA session
  const verifier = await initRecaptcha();
  const phoneInfoOptions = { phoneNumber, session };
  const phoneAuthProvider = new firebase.auth.PhoneAuthProvider();
  const verificationId = await phoneAuthProvider.verifyPhoneNumber(phoneInfoOptions, verifier);
  console.log('[MFA] OTP sent for enrollment to:', phoneNumber);

  return verificationId; // caller will collect OTP and call handleMFAEnrollVerify
}

async function handleMFAEnrollVerify(user, verificationId, otp, displayName) {
  const phoneAuthCredential = firebase.auth.PhoneAuthProvider.credential(verificationId, otp);
  const multiFactorAssertion = firebase.auth.PhoneMultiFactorGenerator.assertion(phoneAuthCredential);

  // Enroll — Firebase sends the MFA Enrollment Notification email automatically
  await user.multiFactor.enroll(multiFactorAssertion, displayName || 'Phone');

  // Update Firestore
  await db.collection('providers').doc(user.uid).update({
    mfaEnrolled: true,
    updatedAt:   firebase.firestore.FieldValue.serverTimestamp(),
  });

  // Owner alert — MFA Enrollment
  sendOwnerAlert(
    `🔐 MFA Enrolled: ${user.displayName || user.email}`,
    `User <b>${user.displayName || 'Unknown'}</b> (${user.email || user.phoneNumber}) enrolled <b>Multi-Factor Authentication</b>.<br/>UID: <code>${user.uid}</code>`
  );

  console.log('[MFA] Enrollment complete for:', user.uid);
}

/**
 * uploadToCloudinary  — LIVE
 * 1. POSTs the image to Cloudinary (unsigned upload via preset "Gigscourt")
 * 2. On success, appends the secure_url to the provider's Firestore doc
 *    using arrayUnion so concurrent uploads never overwrite each other.
 *
 * @param {File}   imageFile  — the File object from the file input
 * @param {string} providerId — the Firestore doc ID (usually Firebase UID)
 * @param {function} onProgress — optional callback(pct) for upload progress
 * @returns {string} the Cloudinary secure_url of the uploaded image
 */
async function uploadToCloudinary(imageFile, providerId, onProgress) {
  const CLOUD_NAME    = 'dszdwnuua';
  const UPLOAD_PRESET = 'Gigscourt';

  const formData = new FormData();
  formData.append('file',           imageFile);
  formData.append('upload_preset',  UPLOAD_PRESET);
  formData.append('folder',         `gigscourt/${providerId}`); // organise by provider

  // Use XMLHttpRequest so we can track upload progress
  const secureUrl = await new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`);

    xhr.upload.onprogress = e => {
      if (e.lengthComputable && onProgress) {
        onProgress(Math.round((e.loaded / e.total) * 100));
      }
    };

    xhr.onload = () => {
      if (xhr.status === 200) {
        const data = JSON.parse(xhr.responseText);
        console.log('[Cloudinary] Upload OK:', data.secure_url);
        resolve(data.secure_url);
      } else {
        reject(new Error(`Cloudinary error ${xhr.status}: ${xhr.responseText}`));
      }
    };

    xhr.onerror = () => reject(new Error('Cloudinary network error'));
    xhr.send(formData);
  });

  // Save URL to the provider's Firestore document — arrayUnion is safe for concurrent uploads
  await db.collection('providers').doc(providerId).update({
    portfolio:  firebase.firestore.FieldValue.arrayUnion(secureUrl),
    updatedAt:  firebase.firestore.FieldValue.serverTimestamp(),
  });
  console.log('[Firestore] portfolio updated for:', providerId);

  return secureUrl;
}

/**
 * uploadIdentityImage  — LIVE
 * Same XHR + Cloudinary pattern as uploadToCloudinary.
 * Writes a SCALAR field (coverPhoto or profileImage) — not arrayUnion —
 * so it overwrites the previous value in Firestore.
 *
 * @param {File}     imageFile  — File from input
 * @param {string}   providerId — Firestore doc ID
 * @param {string}   field      — 'coverPhoto' | 'profileImage'
 * @param {function} onProgress — optional progress callback (0-100)
 * @returns {string} secure_url from Cloudinary
 */
async function uploadIdentityImage(imageFile, providerId, field, onProgress) {
  const CLOUD_NAME    = 'dszdwnuua';
  const UPLOAD_PRESET = 'Gigscourt';

  const formData = new FormData();
  formData.append('file',          imageFile);
  formData.append('upload_preset', UPLOAD_PRESET);
  formData.append('folder',        `gigscourt/${providerId}/identity`);

  const secureUrl = await new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`);
    xhr.upload.onprogress = e => {
      if (e.lengthComputable && onProgress) onProgress(Math.round((e.loaded / e.total) * 100));
    };
    xhr.onload = () => {
      if (xhr.status === 200) {
        const data = JSON.parse(xhr.responseText);
        console.log(`[Cloudinary] ${field} upload OK:`, data.secure_url);
        resolve(data.secure_url);
      } else {
        reject(new Error(`Cloudinary ${xhr.status}: ${xhr.responseText}`));
      }
    };
    xhr.onerror = () => reject(new Error('Cloudinary network error'));
    xhr.send(formData);
  });

  // Overwrite the scalar field in Firestore (set — not arrayUnion)
  await db.collection('providers').doc(providerId).update({
    [field]:   secureUrl,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
  console.log(`[Firestore] ${field} updated for ${providerId}`);
  return secureUrl;
}

// ════════════════════════════════════════════════════════════
//  PORTFOLIO GRID COMPONENT
//  • Subscribes live to Firestore so new images appear instantly
//  • isOwner=true → shows the Action Red "Add Photo" tile
//  • Tracks per-upload progress with an animated overlay
// ════════════════════════════════════════════════════════════
function PortfolioGrid({ providerId, initialImages, isOwner }) {
  const [images,      setImages]      = React.useState(initialImages || []);
  const [uploading,   setUploading]   = React.useState(false);
  const [uploadPct,   setUploadPct]   = React.useState(0);
  const [uploadMsg,   setUploadMsg]   = React.useState('');
  const [previewSrc,  setPreviewSrc]  = React.useState(null); // local blob preview while uploading

  // Live Firestore listener — keeps grid in sync with DB for real doc IDs.
  // Skipped for mock-* IDs (no real Firestore doc exists for demo data).
  React.useEffect(() => {
    if (!providerId || providerId.startsWith('mock')) return;
    const unsub = db.collection('providers').doc(providerId)
      .onSnapshot(snap => {
        if (snap.exists && snap.data().portfolio) {
          setImages(snap.data().portfolio);
        }
      }, err => console.warn('[Portfolio] listen err:', err.message));
    return () => unsub();
  }, [providerId]);

  function triggerFilePicker() {
    if (uploading) return;
    // Check sign-in — PortfolioGrid only rendered with isOwner=true for signed-in users
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/jpeg,image/png,image/webp,image/gif';
    inp.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;

      // Validate size (max 10 MB)
      if (file.size > 10 * 1024 * 1024) {
        setUploadMsg('⚠ Image must be under 10 MB');
        setTimeout(() => setUploadMsg(''), 3500);
        return;
      }

      // Show local preview immediately for instant feedback
      const objectUrl = URL.createObjectURL(file);
      setPreviewSrc(objectUrl);
      setUploading(true);
      setUploadPct(0);
      setUploadMsg('Uploading to Cloudinary…');

      try {
        const url = await uploadToCloudinary(file, providerId, pct => {
          setUploadPct(pct);
          setUploadMsg(`Uploading… ${pct}%`);
        });
        setUploadMsg('✓ Photo added to portfolio!');
        setPreviewSrc(null);
        URL.revokeObjectURL(objectUrl);
        // The onSnapshot listener above will auto-append the URL to `images`.
        // For mock providers (no real Firestore doc), manually append:
        if (providerId.startsWith('mock')) setImages(prev => [...prev, url]);
      } catch(err) {
        console.error('[PortfolioGrid] Upload failed:', err.message);
        setUploadMsg('⚠ Upload failed — try again');
        setPreviewSrc(null);
        URL.revokeObjectURL(objectUrl);
      } finally {
        setUploading(false);
        setUploadPct(0);
        setTimeout(() => setUploadMsg(''), 3500);
      }
    };
    inp.click();
  }

  return (
    <div className="mx-5 mt-6">
      {/* Section header */}
      <div className="flex items-center justify-between mb-3">
        <h3 className="font-bold text-gray-900" style={{ fontFamily:'Syne' }}>
          Portfolio
          {images.length > 0 && <span className="ml-2 text-sm font-normal text-gray-400">({images.length})</span>}
        </h3>
        {isOwner && (
          <button
            onClick={triggerFilePicker}
            disabled={uploading}
            className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-white text-xs font-bold transition-all active:scale-95"
            style={{ background:'var(--red)', opacity: uploading ? 0.6 : 1, fontFamily:'Syne',
              boxShadow:'0 4px 12px rgba(255,56,92,0.35)' }}>
            {uploading
              ? <span className="w-3 h-3 rounded-full border-2 border-white border-t-transparent spin inline-block" />
              : <Icon.Camera size={13} color="white" />}
            {uploading ? `${uploadPct}%` : 'Add Photo'}
          </button>
        )}
      </div>

      {/* Upload status message */}
      {uploadMsg && (
        <div className="mb-3 rounded-xl px-3 py-2.5 text-xs font-medium fade-up flex items-center gap-2"
          style={{
            background: uploadMsg.startsWith('✓') ? 'rgba(0,196,140,0.1)' : uploadMsg.startsWith('⚠') ? 'rgba(255,56,92,0.08)' : 'rgba(255,56,92,0.06)',
            color: uploadMsg.startsWith('✓') ? 'var(--green)' : uploadMsg.startsWith('⚠') ? 'var(--red)' : '#374151',
          }}>
          {uploading && <span className="w-3 h-3 rounded-full border-2 border-current border-t-transparent spin inline-block flex-shrink-0" />}
          {uploadMsg}
        </div>
      )}

      {/* Progress bar — visible during upload */}
      {uploading && uploadPct > 0 && (
        <div className="mb-3 rounded-full overflow-hidden" style={{ height:3, background:'#F3F4F6' }}>
          <div className="h-full rounded-full transition-all" style={{ width:`${uploadPct}%`, background:'var(--red)' }} />
        </div>
      )}

      {/* The 3-column grid */}
      {images.length === 0 && !previewSrc ? (
        /* Empty state */
        <div
          onClick={isOwner ? triggerFilePicker : undefined}
          className="rounded-2xl py-12 flex flex-col items-center gap-2"
          style={{
            background:'#F9FAFB',
            border: isOwner ? '2px dashed rgba(255,56,92,0.3)' : '2px dashed #E5E7EB',
            cursor: isOwner ? 'pointer' : 'default',
          }}>
          <div className="w-12 h-12 rounded-2xl flex items-center justify-center"
            style={{ background: isOwner ? 'rgba(255,56,92,0.08)' : '#F3F4F6' }}>
            <Icon.Camera size={24} color={isOwner ? 'var(--red)' : '#D1D5DB'} />
          </div>
          <p className="text-sm font-semibold" style={{ color: isOwner ? 'var(--red)' : '#9CA3AF', fontFamily:'Syne' }}>
            {isOwner ? 'Tap to add your first photo' : 'No portfolio images yet'}
          </p>
          {isOwner && <p className="text-xs text-gray-400">JPEG, PNG or WEBP · max 10 MB</p>}
        </div>
      ) : (
        <div className="grid grid-cols-3 gap-1.5">
          {/* Existing images */}
          {images.map((img, i) => (
            <div key={i} className="rounded-xl overflow-hidden relative group"
              style={{ aspectRatio:'1/1' }}>
              <img src={img} alt={`portfolio-${i}`} className="w-full h-full object-cover" loading="lazy" />
            </div>
          ))}

          {/* In-progress preview tile — shown during upload */}
          {previewSrc && (
            <div className="rounded-xl overflow-hidden relative" style={{ aspectRatio:'1/1' }}>
              <img src={previewSrc} alt="uploading" className="w-full h-full object-cover" style={{ opacity:0.5 }} />
              {/* Upload progress ring overlay */}
              <div className="absolute inset-0 flex flex-col items-center justify-center"
                style={{ background:'rgba(0,0,0,0.35)' }}>
                <svg width="36" height="36" viewBox="0 0 36 36">
                  <circle cx="18" cy="18" r="15" fill="none" stroke="rgba(255,255,255,0.25)" strokeWidth="3" />
                  <circle cx="18" cy="18" r="15" fill="none" stroke="white" strokeWidth="3"
                    strokeDasharray={`${(uploadPct/100)*94.2} 94.2`}
                    strokeLinecap="round" transform="rotate(-90 18 18)" />
                </svg>
                <span className="text-white text-xs font-bold mt-1">{uploadPct}%</span>
              </div>
            </div>
          )}

          {/* "Add Photo" tile — always last cell when owner */}
          {isOwner && !uploading && (
            <button
              onClick={triggerFilePicker}
              className="rounded-xl flex flex-col items-center justify-center gap-1 transition-all active:scale-95"
              style={{
                aspectRatio:'1/1',
                background:'rgba(255,56,92,0.06)',
                border:'2px dashed rgba(255,56,92,0.4)',
              }}>
              <div className="w-8 h-8 rounded-full flex items-center justify-center"
                style={{ background:'var(--red)' }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </div>
              <span className="text-xs font-bold" style={{ color:'var(--red)', fontFamily:'Syne' }}>Add</span>
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  PROFILE DETAIL  (full-screen view)
// ════════════════════════════════════════════════════════════
function ProfileDetail({ provider, onBack, currentUser }) {
  const [booked, setBooked] = React.useState(false);
  const [liked, setLiked]   = React.useState(false);

  // Subscribe to live availability + identity updates for this provider
  const [liveProvider, setLiveProvider] = React.useState(provider);
  React.useEffect(() => {
    if (provider.id.startsWith('mock')) return;
    const unsub = db.collection('providers').doc(provider.id)
      .onSnapshot(snap => { if (snap.exists) setLiveProvider({ id: snap.id, ...snap.data(), portfolio: snap.data().portfolio || [] }); });
    return () => unsub();
  }, [provider.id]);

  // Identity upload state
  const [coverUploading,  setCoverUploading]  = React.useState(false);
  const [coverPct,        setCoverPct]        = React.useState(0);
  const [coverPreview,    setCoverPreview]    = React.useState(null); // local blob url
  const [avatarUploading, setAvatarUploading] = React.useState(false);
  const [avatarPct,       setAvatarPct]       = React.useState(0);
  const [avatarPreview,   setAvatarPreview]   = React.useState(null);
  const [identityMsg,     setIdentityMsg]     = React.useState('');

  const isOwner = !!(currentUser && currentUser.uid === provider.id);
  const p = liveProvider;

  // Displayed images: prefer local preview (instant feedback) → Firestore live → original prop
  const coverSrc  = coverPreview  || p.coverPhoto  || p.cover  || '';
  const avatarSrc = avatarPreview || p.profileImage || p.avatar || '';

  function pickAndUpload(field, setUploading, setPct, setPreview) {
    if (!isOwner) return;
    const inp = document.createElement('input');
    inp.type   = 'file';
    inp.accept = 'image/jpeg,image/png,image/webp';
    inp.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) { setIdentityMsg('⚠ Image must be under 10 MB'); setTimeout(()=>setIdentityMsg(''),3000); return; }

      // Instant local preview
      const blobUrl = URL.createObjectURL(file);
      setPreview(blobUrl);
      setUploading(true); setPct(0);
      setIdentityMsg(field === 'coverPhoto' ? 'Uploading cover…' : 'Uploading avatar…');

      try {
        await uploadIdentityImage(file, provider.id, field, pct => setPct(pct));
        // Firestore onSnapshot will update liveProvider; revoke blob url
        setPreview(null);
        URL.revokeObjectURL(blobUrl);
        setIdentityMsg(field === 'coverPhoto' ? '✓ Cover photo updated!' : '✓ Avatar updated!');
      } catch(err) {
        console.error(`[ProfileDetail] ${field} upload failed:`, err.message);
        setPreview(null);
        URL.revokeObjectURL(blobUrl);
        setIdentityMsg('⚠ Upload failed — try again');
      } finally {
        setUploading(false); setPct(0);
        setTimeout(() => setIdentityMsg(''), 3500);
      }
    };
    inp.click();
  }

  return (
    <div className="min-h-screen bg-white fade-up">
      {/* Header */}
      <div className="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 py-3"
        style={{ background:'rgba(255,255,255,0.92)', backdropFilter:'blur(12px)', borderBottom:'1px solid rgba(0,0,0,0.06)' }}>
        <button onClick={onBack} className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background:'#F3F4F6' }}>
          <Icon.ArrowLeft size={20} color="#111" />
        </button>
        <span className="font-bold text-base" style={{ fontFamily:'Syne' }}>{p.name}</span>
        <button onClick={() => setLiked(!liked)} className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background:'#F3F4F6' }}>
          <Icon.Heart size={18} color="#6B7280" filled={liked} />
        </button>
      </div>

      {/* ── COVER PHOTO — clickable for owner ── */}
      <div
        className="relative"
        style={{ height:280, marginTop:56, cursor: isOwner ? 'pointer' : 'default' }}
        onClick={() => !coverUploading && pickAndUpload('coverPhoto', setCoverUploading, setCoverPct, setCoverPreview)}
      >
        <img
          src={coverSrc}
          alt="cover"
          className="w-full h-full object-cover"
          style={{ opacity: coverUploading ? 0.6 : 1, transition:'opacity 0.3s' }}
        />
        <div className="absolute inset-0 img-gradient" />

        {/* Owner edit overlay — idle */}
        {isOwner && !coverUploading && (
          <div className="absolute top-3 right-3 flex items-center gap-1.5 px-3 py-1.5 rounded-xl"
            style={{ background:'rgba(0,0,0,0.55)', backdropFilter:'blur(6px)' }}>
            <Icon.Camera size={13} color="white" />
            <span className="text-white text-xs font-semibold" style={{ fontFamily:'Syne' }}>Edit Cover</span>
          </div>

        {/* Upload in-progress overlay */}
        {coverUploading && (
          <div className="absolute inset-0 flex flex-col items-center justify-center gap-3"
            style={{ background:'rgba(0,0,0,0.45)' }}>
            {/* Circular progress ring */}
            <svg width="52" height="52" viewBox="0 0 52 52">
              <circle cx="26" cy="26" r="22" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="4"/>
              <circle cx="26" cy="26" r="22" fill="none" stroke="white" strokeWidth="4"
                strokeDasharray={`${(coverPct/100)*138.2} 138.2`}

            <span className="text-white font-bold text-sm" style={{ fontFamily:'Syne' }}>{coverPct}%</span>

        {/* Progress bar at bottom of cover */}
