const db   = window.__db;
const auth = window.__auth;

// ════════════════════════════════════════════════════════════
//  ① handleFirebaseSignup  — LIVE
//    Creates a Firebase Auth user AND a matching Firestore doc.
// ════════════════════════════════════════════════════════════
async function handleFirebaseSignup(email, password, displayName) {
  const cred = await auth.createUserWithEmailAndPassword(email, password);
  await cred.user.updateProfile({ displayName });

  // Write provider profile to Firestore so user appears in feed immediately
  await db.collection('providers').doc(cred.user.uid).set({
    name:      displayName,
    service:   'New Provider',
    rating:    5.0,
    reviews:   0,
    distance:  0.5,
    available: true,
    avatar:    `https://i.pravatar.cc/300?u=${cred.user.uid}`,
    cover:     'https://images.unsplash.com/photo-1521791136064-7986c2920216?w=600&q=80',
    bio:       'Tell clients about your services…',
    portfolio: [],
    price:     'TBD',
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  });

  console.log('[Firebase Auth] Signup OK:', cred.user.uid);
  return cred.user;
}

// ════════════════════════════════════════════════════════════
//  ② handleFirebaseLogin  — LIVE
// ════════════════════════════════════════════════════════════
async function handleFirebaseLogin(email, password) {
  const cred = await auth.signInWithEmailAndPassword(email, password);
  console.log('[Firebase Auth] Login OK:', cred.user.uid);
  return cred.user;
}

// ════════════════════════════════════════════════════════════
//  ③ updateProviderAvailability  — LIVE
//    Writes the new boolean to Firestore; triggers re-render
//    via the onSnapshot listener in the root App component.
// ════════════════════════════════════════════════════════════
async function updateProviderAvailability(providerId, isAvailable) {
  await db.collection('providers').doc(providerId).update({
    available: isAvailable,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
  console.log(`[Firestore] ${providerId} available → ${isAvailable}`);
  if (isAvailable) sendAvailabilityPing(providerId, null, null);
}

function ToggleSwitch({ value, onChange, disabled }) {
  return (
    <div className="toggle-track"
      style={{ background:value?'var(--green)':'#D1D5DB', opacity:disabled?0.5:1, pointerEvents:disabled?'none':'auto' }}
      onClick={() => !disabled && onChange(!value)}>
      <div className="toggle-thumb" style={{ left:value?'27px':'3px' }} />
    </div>
  );
}

function StatusBadge({ available, large=false }) {
  return (
    <span className={`inline-flex items-center gap-1 font-semibold ${large?'text-sm px-3 py-1.5':'text-xs px-2 py-0.5'} rounded-full`}
      style={{ background:available?'rgba(0,196,140,0.12)':'rgba(255,56,92,0.1)', color:available?'var(--green)':'var(--red)' }}>
      <span className={`rounded-full pulse ${large?'w-2.5 h-2.5':'w-1.5 h-1.5'}`}
        style={{ background:available?'var(--green)':'var(--red)', display:'inline-block' }} />
      {available ? 'Available' : 'Busy'}
    </span>
  );
}

// Firebase connection status banner shown at the top of the Home feed
function FirebaseBanner({ status, count }) {
  const cfg = {
    loading:  { bg:'#FFF8E1', dot:'#FFA000', msg:'Connecting to Firestore…' },
    live:     { bg:'#E8F5E9', dot:'var(--green)', msg:`Firestore live · ${count} provider${count!==1?'s':''} loaded` },
    fallback: { bg:'#FFF3E0', dot:'#FF9800', msg:'Demo data · Add docs to "providers" collection in Firestore' },
    error:    { bg:'#FFEBEE', dot:'var(--red)', msg:'Firestore error · check console for details' },
  };
  const c = cfg[status] || cfg.loading;
  return (
    <div className="mx-5 mt-3 mb-1 flex items-center gap-2 px-3 py-2 rounded-xl"
      style={{ background:c.bg, fontSize:11, fontFamily:'DM Sans' }}>
      <Icon.Firebase size={13} />
      <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background:c.dot }} />
      <span className="text-gray-600 flex-1">{c.msg}</span>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  AUTH MODAL  (bottom sheet)
// ════════════════════════════════════════════════════════════
function AuthModal({ mode, onClose, onSuccess }) {
  const [email,    setEmail]    = React.useState('');
  const [password, setPassword] = React.useState('');
  const [name,     setName]     = React.useState('');
  const [loading,  setLoading]  = React.useState(false);
  const [error,    setError]    = React.useState('');
  const [done,     setDone]     = React.useState(false);

  async function submit() {
    if (!email || !password) { setError('Please fill in all fields.'); return; }
    if (mode==='signup' && !name) { setError('Please enter your name.'); return; }
    setLoading(true); setError('');
    try {
      const user = mode==='signup'
        ? await handleFirebaseSignup(email, password, name)
        : await handleFirebaseLogin(email, password);
      setDone(true);
      setTimeout(() => { onSuccess(user); onClose(); }, 1200);
    } catch(err) {
      setError(err.message.replace('Firebase: ','').replace(/\s*\(auth\/[^)]+\)/,'').trim());
    } finally { setLoading(false); }
  }

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{ background:'rgba(0,0,0,0.5)' }}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="w-full max-w-md rounded-t-3xl bg-white px-6 pt-6 pb-10 fade-up">
        <div className="w-10 h-1 rounded-full bg-gray-200 mx-auto mb-5" />
        <h2 className="text-xl font-extrabold text-gray-900 mb-1" style={{ fontFamily:'Syne' }}>
          {mode==='signup'?'Join GigsCourt':'Welcome Back'}
        </h2>
        <p className="text-sm text-gray-400 mb-5">{mode==='signup'?'Create your provider account':'Sign in to continue'}</p>
        {done ? (
          <div className="flex flex-col items-center py-8 gap-3">
            <div className="w-14 h-14 rounded-full flex items-center justify-center" style={{ background:'rgba(0,196,140,0.12)' }}>
              <Icon.Check size={28} color="var(--green)" />
            </div>
            <p className="font-bold text-gray-800" style={{ fontFamily:'Syne' }}>{mode==='signup'?'Account Created!':'Signed In!'}</p>
          </div>
        ) : (
          <>
            {mode==='signup' && (
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Full Name"
                className="w-full px-4 py-3.5 rounded-2xl text-sm outline-none mb-3"
                style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }} />
            )}
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email address"
              className="w-full px-4 py-3.5 rounded-2xl text-sm outline-none mb-3"
              style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }} />
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Password (min 6 chars)"
              className="w-full px-4 py-3.5 rounded-2xl text-sm outline-none mb-3"
              style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }} />
            {error && (
              <div className="rounded-xl px-4 py-3 mb-3 text-sm" style={{ background:'rgba(255,56,92,0.06)',color:'var(--red)' }}>
                {error}
              </div>
            )}
            <button onClick={submit} disabled={loading}
              className="w-full py-4 rounded-2xl font-bold text-white text-base flex items-center justify-center gap-2"
              style={{ background:'var(--red)', fontFamily:'Syne', opacity:loading?0.7:1 }}>
              {loading
                ? <><span className="w-5 h-5 rounded-full border-2 border-white border-t-transparent spin inline-block" /> Processing…</>
                : (mode==='signup'?'Create Account':'Sign In')}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  PROFILE / DASHBOARD TAB  — live availability toggle
// ════════════════════════════════════════════════════════════
function ProfileTab({ currentUser }) {
  const [user,        setUser]        = React.useState(currentUser);
  const [isAvailable, setIsAvailable] = React.useState(true);
  const [toggling,    setToggling]    = React.useState(false);
  const [toggleMsg,   setToggleMsg]   = React.useState('');
  const [authModal,   setAuthModal]   = React.useState(null); // 'login'|'signup'|null

  // Keep auth in sync
  React.useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => setUser(u));
    return () => unsub();
  }, []);

  // Subscribe to this user's provider doc so availability reflects Firestore truth
  React.useEffect(() => {
    if (!user) return;
    const unsub = db.collection('providers').doc(user.uid)
      .onSnapshot(snap => { if (snap.exists) setIsAvailable(snap.data().available ?? true); },
        err => console.warn('[Firestore] Profile listen:', err.message));
    return () => unsub();
  }, [user?.uid]);

  // ── LIVE TOGGLE — writes to Firestore ──
  async function handleAvailabilityToggle(val) {
    if (!user) {
      setToggleMsg('⚠ Sign in to manage your status.');
      setTimeout(()=>setToggleMsg(''), 3000);
      return;
    }
    setToggling(true);
    try {
      await updateProviderAvailability(user.uid, val);
      setIsAvailable(val);
      setToggleMsg(val ? '✓ You\'re now visible to clients!' : '✓ Status set to Busy.');
    } catch(err) {
      setToggleMsg('⚠ Update failed — check your connection.');
      console.error('[Toggle]', err.message);
    } finally {
      setToggling(false);
      setTimeout(()=>setToggleMsg(''), 3000);
    }
  }

  function handleUploadPortfolio() {
    if (!user) { alert('Sign in first to upload portfolio images.'); return; }
    const inp = document.createElement('input');
    inp.type='file'; inp.accept='image/*';
    inp.onchange = e => { if (e.target.files[0]) uploadToCloudinary(e.target.files[0]); };
    inp.click();
  }

  const displayName  = user?.displayName || 'Guest User';
  const displayEmail = user?.email       || 'Not signed in';

  return (
    <div className="pb-28">
      {authModal && (
        <AuthModal mode={authModal} onClose={()=>setAuthModal(null)} onSuccess={u=>setUser(u)} />
      )}
      <div className="px-5 pt-6">
        <div className="flex items-center justify-between mb-5">
          <h1 className="text-2xl font-extrabold text-gray-900" style={{ fontFamily:'Syne' }}>Dashboard</h1>
          <button className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background:'#F3F4F6' }}>
            <Icon.Settings size={18} color="#6B7280" />
          </button>
        </div>

        {/* Dark provider card */}
        <div className="rounded-3xl p-5 mb-5"
          style={{ background:'linear-gradient(135deg,#1A1A2E 0%,#2D2D44 100%)', boxShadow:'0 8px 32px rgba(26,26,46,0.3)' }}>
          {/* Avatar + identity */}
          <div className="flex items-center gap-4 mb-5">
            <div className="relative">
              <img src={user ? `https://i.pravatar.cc/300?u=${user.uid}` : 'https://i.pravatar.cc/300?img=60'}
                alt="me" className="w-16 h-16 rounded-2xl object-cover border-2 border-white" />
              <button onClick={handleUploadPortfolio}
                className="absolute -bottom-1 -right-1 w-6 h-6 rounded-full flex items-center justify-center"
                style={{ background:'var(--red)' }}>
                <Icon.Camera size={12} color="white" />
              </button>
            </div>
            <div className="flex-1 min-w-0">
              <h2 className="text-white font-bold text-lg truncate" style={{ fontFamily:'Syne' }}>{displayName}</h2>
              <p className="text-gray-400 text-xs truncate">{displayEmail}</p>
              {user && (
                <div className="flex items-center gap-1 mt-1">
                  <Icon.Firebase size={11} />
                  <span className="text-xs" style={{ color:'var(--green)' }}>Firebase Auth active</span>
                </div>
              )}
            </div>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-3 gap-3 mb-5">
            {[{l:'Bookings',v:user?'24':'—'},{l:'Earnings',v:user?'$1,840':'—'},{l:'Rating',v:'4.9'}].map(s=>(
              <div key={s.l} className="rounded-2xl p-3 text-center" style={{ background:'rgba(255,255,255,0.07)' }}>
                <p className="text-white font-bold" style={{ fontFamily:'Syne' }}>{s.v}</p>
                <p className="text-gray-400 text-xs mt-0.5">{s.l}</p>
              </div>
            ))}
          </div>

          {/* ── LIVE AVAILABILITY TOGGLE ── */}
          <div className="rounded-2xl p-4" style={{ background:'rgba(255,255,255,0.07)' }}>
            <div className="flex items-center justify-between">
              <div className="flex-1">
                <p className="text-white font-semibold text-sm">Availability Status</p>
                <p className="text-gray-400 text-xs mt-0.5">
                  {user
                    ? (isAvailable ? 'Visible to nearby clients' : 'Hidden from search')
                    : 'Sign in to manage status'}
                </p>
              </div>
              <div className="flex items-center gap-2 ml-3">
                <StatusBadge available={isAvailable} />
                <ToggleSwitch value={isAvailable} onChange={handleAvailabilityToggle} disabled={toggling} />
              </div>
            </div>
            {/* Firestore write feedback message */}
            {(toggleMsg || toggling) && (
              <div className="mt-3 rounded-xl px-3 py-2 text-xs font-medium fade-up flex items-center gap-2"
                style={{ background:'rgba(255,255,255,0.1)', color: toggleMsg.startsWith('✓') ? 'var(--green)' : toggleMsg.startsWith('⚠') ? '#FFA000' : '#FFF' }}>
                {toggling && <span className="w-3 h-3 rounded-full border border-white border-t-transparent spin inline-block flex-shrink-0" />}
                {toggleMsg || 'Saving to Firestore…'}
              </div>
            )}
          </div>
        </div>

        {/* Quick actions */}
        <h3 className="font-bold text-gray-900 mb-3" style={{ fontFamily:'Syne' }}>Quick Actions</h3>
        <div className="grid grid-cols-2 gap-3 mb-5">
          {[
            {label:'Upload Work',   sub:'Add to portfolio',icon:'📸',action:handleUploadPortfolio},
            {label:'View Bookings', sub:'3 pending',       icon:'📅',action:()=>{}},
            {label:'Edit Profile',  sub:'Update your info',icon:'✏️',action:()=>{}},
            {label:'Earnings',      sub:'View payouts',    icon:'💰',action:()=>{}},
          ].map(a=>(
            <button key={a.label} onClick={a.action}
              className="rounded-2xl p-4 text-left active:scale-95 transition-all"
              style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }}>
              <span className="text-2xl">{a.icon}</span>
              <p className="font-semibold text-gray-800 text-sm mt-2" style={{ fontFamily:'Syne' }}>{a.label}</p>
              <p className="text-xs text-gray-400 mt-0.5">{a.sub}</p>
            </button>
          ))}
        </div>

        {/* Account section */}
        <h3 className="font-bold text-gray-900 mb-3" style={{ fontFamily:'Syne' }}>Account</h3>
        <div className="rounded-2xl overflow-hidden border" style={{ borderColor:'#E5E7EB' }}>
          {[
            { label: user ? '✓ Signed in via Firebase' : 'Sign In', action:()=>!user&&setAuthModal('login'), active:!!user },
            { label:'Create Account', action:()=>setAuthModal('signup'), active:false },
            { label:'Notifications',  action:()=>{},                    active:false },
            { label:'Help & Support', action:()=>{},                    active:false },
          ].map((item,i,arr)=>(
            <button key={item.label} onClick={item.action}
              className="w-full px-4 py-3.5 text-left text-sm font-medium flex items-center justify-between"
              style={{ color:item.active?'var(--green)':'#374151', borderBottom:i<arr.length-1?'1px solid #F3F4F6':'none' }}>
              {item.label}
              <span className="text-gray-300">{item.active?'✓':'›'}</span>
            </button>
          ))}
        </div>
        {user && (
          <button onClick={()=>auth.signOut()} className="w-full mt-3 py-3.5 rounded-2xl text-sm font-semibold"
            style={{ color:'var(--red)', background:'rgba(255,56,92,0.06)', border:'1px solid rgba(255,56,92,0.15)' }}>
            Sign Out
          </button>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  BOTTOM NAV
// ════════════════════════════════════════════════════════════
function BottomNav({ activeTab, onChange }) {
  const tabs = [
    {id:'home',label:'Home',I:Icon.Home},{id:'search',label:'Search',I:Icon.Search},
    {id:'map',label:'Map',I:Icon.Map},{id:'profile',label:'Profile',I:Icon.User},
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 z-50 bottom-nav"
      style={{ background:'rgba(255,255,255,0.97)', backdropFilter:'blur(16px)', paddingBottom:'env(safe-area-inset-bottom)' }}>
      <div className="flex">
        {tabs.map(tab => {
          const active = activeTab===tab.id;
          return (
            <button key={tab.id} onClick={()=>onChange(tab.id)} className="flex-1 flex flex-col items-center py-3 gap-0.5 transition-all">
              <tab.I size={22} color={active?'var(--red)':'#9CA3AF'} />
              <span className="text-xs font-semibold mt-0.5" style={{ color:active?'var(--red)':'#9CA3AF', fontFamily:'DM Sans' }}>{tab.label}</span>
              {active && <span className="w-1 h-1 rounded-full" style={{ background:'var(--red)' }} />}
            </button>

        })}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  ROOT APP  — Firestore onSnapshot listener for providers feed
// ════════════════════════════════════════════════════════════
function App() {
  const [tab,             setTab]         = React.useState('home');
  const [viewingProvider, setViewing]     = React.useState(null);
  const [providers,       setProviders]   = React.useState([]);
  const [fbStatus,        setFbStatus]    = React.useState('loading');
  const [likedIds,        setLikedIds]    = React.useState([]);
  const [currentUser,     setCurrentUser] = React.useState(null);

  // Auth observer
  React.useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => setCurrentUser(u));
    return () => unsub();
  }, []);

  // ── LIVE Firestore listener on "providers" collection ──
  // Automatically re-renders when any provider's availability changes.
  React.useEffect(() => {
    setFbStatus('loading');

    let query;
    try {
      // Try ordered query — requires a Firestore index (auto-created)
      query = db.collection('providers').orderBy('createdAt', 'desc');
    } catch(e) {
      query = db.collection('providers');
    }

    const unsub = query.onSnapshot(
      snap => {
        if (snap.empty) {
          console.log('[Firestore] providers collection empty — using mock data');
          setProviders(MOCK_PROVIDERS);
          setFbStatus('fallback');
        } else {
          const docs = snap.docs.map(d => ({
            id: d.id,
            ...d.data(),
            portfolio: d.data().portfolio || [],
          }));
          console.log(`[Firestore] ${docs.length} provider(s) live`);
          setProviders(docs);
          setFbStatus('live');
        }
      },
      err => {
        console.error('[Firestore] onSnapshot error:', err.code, err.message);
        setProviders(MOCK_PROVIDERS);
        setFbStatus(err.code==='permission-denied' ? 'fallback' : 'error');
      }
    );

    return () => unsub();
  }, []);

  function handleLike(id) {
    setLikedIds(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  }

  function handleViewProvider(provider) {
    setViewing(provider);
    window.scrollTo(0, 0);
  }

  if (viewingProvider) {
    return <ProfileDetail provider={viewingProvider} onBack={() => { setViewing(null); window.scrollTo(0,0); }} />;
  }

  return (
    <div className="max-w-md mx-auto min-h-screen">
      <TopHeader currentUser={currentUser} />
      <div style={{ paddingTop:64 }}>
        {tab==='home'    && <HomeTab    providers={providers} fbStatus={fbStatus} onViewProvider={handleViewProvider} likedIds={likedIds} onLike={handleLike} />}
        {tab==='search'  && <SearchTab  providers={providers} onViewProvider={handleViewProvider} likedIds={likedIds} onLike={handleLike} />}
        {tab==='map'     && <MapTab     providers={providers} onViewProvider={handleViewProvider} />}
        {tab==='profile' && <ProfileTab currentUser={currentUser} />}
      </div>
      <BottomNav activeTab={tab} onChange={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
