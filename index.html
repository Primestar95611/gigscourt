<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillSpot – Find Local Pros</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc, query, where }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAPKUM4Tzk0g80o3AgQRyzcGKNMZx7GJEE",
    authDomain: "skillspot95611.firebaseapp.com",
    projectId: "skillspot95611",
    storageBucket: "skillspot95611.appspot.com",
    messagingSenderId: "880371869598",
    appId: "1:880371869598:web:359ba15c51474fd595188f",
    measurementId: "G-36ELL41V4Q"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function distKm(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  function kmToMi(km){ return km * 0.621371; }

  let currentUser = null;
  let currentProfile = null;
  let map = null;
  let markers = [];
  let userLat = null, userLon = null;
  let allProviders = [];

  const $ = id => document.getElementById(id);

  function showPage(id) {
    document.querySelectorAll(".page").forEach(p => p.style.display = "none");
    $(id).style.display = "block";
    window.scrollTo(0,0);
  }

  function toast(msg, type="info") {
    const t = document.createElement("div");
    t.className = "toast toast-"+type;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.classList.add("show"),10);
    setTimeout(()=>{ t.classList.remove("show"); setTimeout(()=>t.remove(),400); },3200);
  }

  onAuthStateChanged(auth, async user => {
    currentUser = user;
    if (user) {
      const snap = await getDoc(doc(db,"users",user.uid));
      currentProfile = snap.exists() ? snap.data() : null;
      updateNav(user);
    } else {
      currentProfile = null;
      updateNav(null);
    }
  });

  function updateNav(user) {
    $("nav-auth").innerHTML = user
      ? `<span class="nav-greeting">Hey, ${(currentProfile?.name||user.email).split(" ")[0]} 👋</span>
         <button class="btn-ghost" onclick="window.doSignOut()">Sign Out</button>`
      : `<button class="btn-ghost" onclick="showPage('page-login')">Sign In</button>
         <button class="btn-primary" onclick="showPage('page-signup')">Join Free</button>`;
  }

  window.doSignOut = async () => {
    await signOut(auth);
    toast("Signed out");
    showPage("page-home");
  };

  window.doSignup = async () => {
    const role     = document.querySelector('input[name="role"]:checked')?.value;
    const name     = $("su-name").value.trim();
    const email    = $("su-email").value.trim();
    const password = $("su-password").value;
    const category = $("su-category").value;
    const bio      = $("su-bio").value.trim();
    const location = $("su-location").value.trim();

    if (!role) return toast("Choose Customer or Provider","error");
    if (!name) return toast("Enter your name","error");
    if (!email) return toast("Enter your email","error");
    if (password.length < 6) return toast("Password must be 6+ characters","error");
    if (role==="provider" && !category) return toast("Select your service category","error");

    $("btn-signup").textContent = "Creating account...";
    $("btn-signup").disabled = true;

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      let lat = null, lon = null;

      if (role === "provider" && location) {
        try {
          const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(location)}&format=json&limit=1`);
          const j = await r.json();
          if (j.length) { lat = parseFloat(j[0].lat); lon = parseFloat(j[0].lon); }
        } catch(e) {}
      }

      const profileData = {
        uid: cred.user.uid,
        name,
        email,
        role,
        createdAt: Date.now(),
        ...(role==="provider" ? { category, bio, location, lat, lon, rating: 0, reviews: 0, available: true, images:[] } : {})
      };

      await setDoc(doc(db,"users",cred.user.uid), profileData);

      currentProfile = profileData;
      updateNav(cred.user);
      toast("Account created! 🎉","success");
      showPage("page-home");

    } catch(e) {
      toast(e.message.replace("Firebase: ",""),"error");
    } finally {
      $("btn-signup").textContent = "Create Account";
      $("btn-signup").disabled = false;
    }
  };

  window.doLogin = async () => {
    const email = $("li-email").value.trim();
    const password = $("li-password").value;

    if (!email || !password) return toast("Fill in all fields","error");

    $("btn-login").textContent = "Signing in...";
    $("btn-login").disabled = true;

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const snap = await getDoc(doc(db,"users",cred.user.uid));
      currentProfile = snap.exists() ? snap.data() : null;
      updateNav(cred.user);
      toast("Welcome back 👋","success");
      showPage("page-home");
    } catch(e) {
      toast("Wrong email or password","error");
    } finally {
      $("btn-login").textContent = "Sign In";
      $("btn-login").disabled = false;
    }
  };

  window.toggleProviderFields = () => {
    const role = document.querySelector('input[name="role"]:checked')?.value;
    $("provider-fields").style.display = role==="provider" ? "flex" : "none";
  };

  window.initDistLabel = () => {
    const r = $("dist-range");
    $("dist-label").textContent = r.value + " mi";
    r.oninput = () => $("dist-label").textContent = r.value + " mi";
  };

  window.addEventListener("load", () => {
    showPage("page-home");
    initDistLabel();
  });
</script>

<style>
/* KEEPING YOUR ENTIRE CSS UNCHANGED */
</style>

</head>
<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<nav>
  <div class="logo" onclick="showPage('page-home')">SkillSpot</div>
  <div id="nav-auth">
    <button class="btn-ghost" onclick="showPage('page-login')">Sign In</button>
    <button class="btn-primary" onclick="showPage('page-signup')">Join Free</button>
  </div>
</nav>

<div id="page-home" class="page">
  <div class="hero">
    <div class="hero-badge">Local Services, Reimagined</div>
    <h1>Find Skilled Pros<br/><span>Near You</span></h1>
    <p>Search barbers, stylists, electricians and more — filtered by distance and rated by your community.</p>

    <div class="search-bar">
      <div class="search-input-wrap">
        <input id="search-input" type="text" placeholder="barber, plumber, photographer…" onkeydown="if(event.key==='Enter') doSearch()"/>
      </div>
      <div class="dist-wrap">
        <span>Max</span>
        <input type="range" id="dist-range" min="0.5" max="25" step="0.5" value="5"/>
        <span id="dist-label">5 mi</span>
      </div>
      <button class="btn-primary" onclick="doSearch()">Search</button>
    </div>
  </div>
</div>

</body>
</html>
