        // Haversine distance
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        async function getOrCreateChat(partnerId) {
            if (!currentUser) return null;
            const chatId = [currentUser.uid, partnerId].sort().join('_');
            const chatRef = doc(db, 'chats', chatId);
            const chatSnap = await getDoc(chatRef);
            if (!chatSnap.exists()) {
                await setDoc(chatRef, {
                    participants: [currentUser.uid, partnerId],
                    createdAt: serverTimestamp()
                });
            }
            return chatId;
        }

        async function loadMessages(chatId) {
            if (chatUnsubscribe) chatUnsubscribe();
            const messagesRef = collection(db, 'chats', chatId, 'messages');
            const q = query(messagesRef, orderBy('timestamp', 'asc'));
            chatUnsubscribe = onSnapshot(q, (snapshot) => {

                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });

            panel.addEventListener('touchstart', (e) => {

            }, { passive: true });
            
            panel.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchEndX - touchStartX;
                
                if (Math.abs(diff) > 50) {
                    const tabs = isAdmin ? 
                        ['home', 'search', 'messages', 'profile', 'admin'] : 
                        ['home', 'search', 'messages', 'profile'];
                    const currentIndex = tabs.indexOf(currentTab);
                    
                    if (diff > 0 && currentIndex > 0) {
                        // Swipe right - previous tab
                        switchToTab(tabs[currentIndex - 1]);
                    } else if (diff < 0 && currentIndex < tabs.length - 1) {
                        // Swipe left - next tab
                        switchToTab(tabs[currentIndex + 1]);
                    }
                }
            }, { passive: true });
        }

                                    <span>(${p.reviews})</span>
                                </div>
                                <div class="card-distance"><i class="fas fa-location-dot"></i> ${p.distance.toFixed(1)} km</div>
                                <div class="card-skills">
                                    ${p.skills?.slice(0, 3).join(' • ') || p.category || 'Professional'}
                                    ${p.skills?.length > 3 ? '...' : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="swipe-indicator" id="swipeIndicator">
                        <i class="fas fa-chevron-up"></i>
                        <span>Swipe up for more</span>
                    </div>
                </div>
            `;

            // Hide swipe indicator on scroll
            const indicator = document.getElementById('swipeIndicator');
            if (indicator) {
                const checkScroll = () => {
                    if (panel.scrollTop > 10) {
                        indicator.classList.add('hidden');
                        panel.removeEventListener('scroll', checkScroll);
                    }
                };
                panel.addEventListener('scroll', checkScroll);
            }

            // Card click handlers
            document.querySelectorAll('.talent-card-compact').forEach(card => {
                card.addEventListener('click', () => openChat(card.dataset.userId));
            });

            // Check for welcome back
            const lastVisit = localStorage.getItem('lastVisit');
            if (lastVisit && (Date.now() - parseInt(lastVisit) > WELCOME_DELAY)) {
                showWelcomeBack(currentUser);
            }
            localStorage.setItem('lastVisit', Date.now().toString());
        }

        // Render Search with 50/50 split
        async function renderSearch() {
            panel.innerHTML = `
                <div class="search-split">
                    <div class="map-half">
                        <div id="map"></div>
                        <div class="floating-slider">
                            <div class="slider-label">
                                <span><i class="fas fa-location-dot"></i> Radius</span>
                                <span id="radiusValue">3 km</span>
                            </div>
                            <input type="range" id="radiusSlider" min="1" max="20" value="3" step="0.5">
                        </div>
                    </div>
                    <div class="list-half">
                        <div class="search-header">
                            <input type="text" id="skillSearch" class="search-input" placeholder="Search by skill...">
                        </div>
                        <div id="searchResults"></div>
                    </div>
                </div>
            `;

            // Init map with preferCanvas
            setTimeout(() => {
                if (!mapInitialized && document.getElementById('map')) {
                    map = L.map('map', {
                        preferCanvas: true,
                        zoomControl: false,
                        attributionControl: false
                    }).setView([liveGPS?.lat || 40.7128, liveGPS?.lng || -74.0060], 13);
                    
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
                    mapInitialized = true;
                }

                // Search logic
                const searchInput = document.getElementById('skillSearch');
                const resultsDiv = document.getElementById('searchResults');
                
                function filterProviders() {
                    const term = searchInput.value.toLowerCase();
                    const providers = allUsers.filter(u => u.workplaceCoords?.lat && u.workplaceCoords?.lng);
                    
                    const filtered = providers.filter(p => {
                        const skills = p.skills || [];
                        const searchText = [
                            p.displayName,
                            p.businessName,
                            p.category,
                            ...skills
                        ].join(' ').toLowerCase();
                        return searchText.includes(term);
                    });

                    resultsDiv.innerHTML = filtered.map(p => `
                        <div class="talent-card-compact" style="margin-bottom:8px;" data-user-id="${p.id}">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="card-avatar" style="margin-bottom:0;"><i class="fas fa-store"></i></div>
                                <div style="flex:1;">
                                    <div style="font-weight:600;">${p.displayName || p.businessName || 'Business'}</div>
                                    <div style="font-size:0.75rem; color:#64748B;">${p.skills?.slice(0,3).join(' • ') || p.category}</div>
                                </div>
                            </div>
                        </div>
                    `).join('');

                    document.querySelectorAll('#searchResults .talent-card-compact').forEach(card => {
                        card.addEventListener('click', () => openChat(card.dataset.userId));
                    });
                }

                searchInput.addEventListener('input', filterProviders);
                filterProviders();
            }, 100);
        }

        // Render Inbox
        async function renderInbox() {
            if (!currentUser) {
                panel.innerHTML = '<div style="padding:40px; text-align:center;">Sign in to see messages</div>';
                return;
            }
            panel.innerHTML = '<div style="padding:20px; text-align:center;">Loading conversations...</div>';
        }

        // Render Profile
        async function renderProfile() {
            if (!currentUser) {
                panel.innerHTML = '<div style="padding:40px; text-align:center;"><button class="btn" onclick="overlay.classList.add(\'show\')">Sign In</button></div>';
                return;
            }
            await loadUserProfile(currentUser.uid);
            panel.innerHTML = `
                <div style="padding:20px;">
                    <h3>${userProfileData.displayName || userProfileData.businessName || 'Business'}</h3>
                    <p>${userProfileData.email || ''}</p>
                    <button class="btn btn-secondary" id="signOutBtn">Sign Out</button>
                </div>
            `;
            document.getElementById('signOutBtn')?.addEventListener('click', () => signOut(auth));
        }

        // Render Admin Panel
        async function renderAdminPanel() {
            const users = await loadAllUsersForAdmin();
            panel.innerHTML = `
                <div style="padding:20px;">
                    <h3>Admin Dashboard</h3>
                    <p>Total Users: ${users.length}</p>
                </div>
            `;
        }

        async function loadAllUsersForAdmin() {
            const snapshot = await getDocs(collection(db, 'users'));
            const users = [];
            snapshot.forEach(doc => users.push({ id: doc.id, ...doc.data() }));
            return users;
        }

        // Open chat with user
        async function openChat(userId) {
            if (!currentUser) {
                overlay.classList.add('show');
                return;
            }
            const partner = allUsers.find(u => u.id === userId);
            if (!partner) return;
            
            currentChatPartner = { id: userId, ...partner };
            chatPartnerName.textContent = partner.displayName || partner.businessName || 'User';
            
            const chatId = await getOrCreateChat(userId);
            await loadMessages(chatId);
            chatContainer.classList.add('active');
        }

        // Render bottom navigation
        function renderBottomNav() {
            const tabs = [
                { id: 'home', icon: 'fa-home', label: 'Home' },
                { id: 'search', icon: 'fa-search', label: 'Search' },
                { id: 'messages', icon: 'fa-envelope', label: 'Messages' },
                { id: 'profile', icon: 'fa-user-circle', label: 'Profile' }
            ];
            if (isAdmin) tabs.push({ id: 'admin', icon: 'fa-shield-alt', label: 'Admin' });

            bottomNav.innerHTML = tabs.map(tab => `
                <button class="nav-item ${tab.id === currentTab ? 'active' : ''}" data-tab="${tab.id}">
                    <i class="fas ${tab.icon}"></i>
                    <span>${tab.label}</span>
                </button>
            `).join('');

            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    switchToTab(btn.dataset.tab);
                });
            });
        }

        // Auth functions
        function setAuthMode(mode) {
            currentAuthMode = mode;
            authPrimaryBtn.innerText = mode === 'login' ? 'Login' : 'Sign up';
            authToggleText.innerText = mode === 'login' ? "Don't have an account?" : 'Already have an account?';
            authToggleBtn.innerText = mode === 'login' ? 'Sign up' : 'Login';
            
            // Show/hide business name field
            authBusinessName.style.display = mode === 'signup' ? 'block' : 'none';
        }

        authToggleBtn.addEventListener('click', () => setAuthMode(currentAuthMode === 'login' ? 'signup' : 'login'));
        
        authPrimaryBtn.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            const pass = authPassword.value.trim();
            const businessName = authBusinessName.value.trim();
            
            if (!email || !pass) { authMessage.innerText = 'Fill all fields'; return; }
            if (currentAuthMode === 'signup' && !businessName) { authMessage.innerText = 'Business name required'; return; }
            
            try {
                let userCred;
                if (currentAuthMode === 'login') {
                    userCred = await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    userCred = await createUserWithEmailAndPassword(auth, email, pass);
                    await saveUserProfile(userCred.user.uid, {
                        businessName: businessName,
                        displayName: businessName,
                        email: email,
                        skills: [],
                        createdAt: serverTimestamp()
                    });
                }
                overlay.classList.remove('show');
                authEmail.value = ''; 
                authPassword.value = '';
                authBusinessName.value = '';
                updateActivity();
            } catch (error) { authMessage.innerText = error.message; }
        });

        googleBtn.addEventListener('click', async () => {
            try { 
                await signInWithPopup(auth, provider); 
                overlay.classList.remove('show'); 
                updateActivity();
            } catch (error) { authMessage.innerText = error.message; }
        });

        closeAuthBtn.addEventListener('click', () => overlay.classList.remove('show'));
        window.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('show'); });

        chatBackBtn.addEventListener('click', () => {
            chatContainer.classList.remove('active');
            if (chatUnsubscribe) chatUnsubscribe();
        });

        sendMessageBtn.addEventListener('click', async () => {
            if (!currentChatPartner) return;
            const chatId = await getOrCreateChat(currentChatPartner.id);
            await sendMessage(chatId, chatInput.value);
            chatInput.value = '';
        });

        // Auth state observer
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            isAdmin = user?.email === ADMIN_EMAIL;
            
            // Check session
            if (user && !checkSession()) return;
            
            renderBottomNav();
            
            if (user) {
                overlay.classList.remove('show');
                await loadUserProfile(user.uid);
                await loadAllUsers();
                updateActivity();
                
                // Check for welcome back
                const lastVisit = localStorage.getItem('lastVisit');
                if (lastVisit && (Date.now() - parseInt(lastVisit) > WELCOME_DELAY)) {
                    setTimeout(() => showWelcomeBack(user), 500);
                }
                localStorage.setItem('lastVisit', Date.now().toString());
            } else {
                userProfileData = {};
                isAdmin = false;
            }
            
            // Render current tab
            if (currentTab === 'home') renderHome();
            else if (currentTab === 'search') renderSearch();
            else if (currentTab === 'messages') renderInbox();
            else if (currentTab === 'profile') renderProfile();
            else if (currentTab === 'admin' && isAdmin) renderAdminPanel();
            else {
                currentTab = 'home';
                renderHome();
            }
        });

        // Initialize
        authBusinessName.style.display = 'none';
        setAuthMode('login');
        renderBottomNav();
        renderHome();
        setupEdgeSwipe();
        overlay.classList.remove('show');
        
        // Activity tracking
        ['click', 'touch', 'scroll'].forEach(ev => 
            document.addEventListener(ev, updateActivity)
        );
    </script>
</body>
</html>
