<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GigsCourt · premium talent marketplace</title>
  <!-- Leaflet CSS (openstreetmap) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #f8fafd;
      color: #0f1419;
      overscroll-behavior: none;
      height: 100vh;
      width: 100%;
      position: fixed;
      overflow: hidden;
    }

    #app {
      height: 100%;
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: white;
    }

    /* Auth screens */
    .auth-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      background: white;
      -webkit-overflow-scrolling: touch;
    }

    .hidden {
      display: none !important;
    }

    /* Main app */
    .main-app {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 90px;
    }

    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 28px;
      border-top: 1px solid rgba(0, 0, 0, 0.04);
      z-index: 1000;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 500;
      color: #8e94a7;
      background: transparent;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      transition: color 0.2s;
    }

    .tab-item.active {
      color: #0066ff;
      font-weight: 600;
    }

    .tab-icon {
      font-size: 22px;
      margin-bottom: 2px;
    }

    /* Cards grid */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
    }

    .provider-card {
      background: white;
      border-radius: 24px;
      padding: 14px 10px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(0, 0, 0, 0.02);
      cursor: pointer;
      transition: transform 0.15s;
    }

    .provider-card:active {
      transform: scale(0.98);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 20px;
      background: #f0f3f8;
      object-fit: cover;
      margin-bottom: 10px;
    }

    .business-name {
      font-weight: 650;
      font-size: 15px;
      line-height: 1.3;
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      margin: 4px 0;
    }

    .star {
      color: #f5b342;
    }

    .distance {
      font-size: 12px;
      color: #6b7280;
    }

    .skills {
      font-size: 12px;
      color: #8e94a7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Bottom sheet */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .sheet-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      border-radius: 32px 32px 0 0;
      padding: 20px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.1, 1);
      will-change: transform;
      z-index: 2001;
      max-height: 80vh;
      overflow-y: auto;
    }

    .bottom-sheet.active {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 48px;
      height: 5px;
      background: #d0d5dd;
      border-radius: 10px;
      margin: 0 auto 20px;
    }

    /* Form elements */
    .input-field {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid #e5e9f0;
      border-radius: 30px;
      font-size: 16px;
      background: #fafbfc;
      margin-bottom: 16px;
    }

    .phone-input-container {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .phone-input-container select {
      width: 30%;
      padding: 0 12px;
      border-radius: 30px;
      border: 1px solid #e5e9f0;
      background: #fafbfc;
      font-size: 15px;
    }

    .phone-input-container input {
      width: 70%;
      margin-bottom: 0;
    }

    .skill-tag {
      display: inline-block;
      background: #f0f3f8;
      padding: 10px 20px;
      border-radius: 40px;
      margin: 5px 6px 0 0;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .skill-tag.selected {
      background: #0066ff;
      color: white;
    }

    .btn {
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 16px;
      font-weight: 600;
      font-size: 16px;
      width: 100%;
      margin-top: 12px;
      box-shadow: 0 8px 20px rgba(0, 102, 255, 0.2);
    }

    .btn-outline {
      background: white;
      border: 1.5px solid #e5e9f0;
      color: #0f1419;
      box-shadow: none;
    }

    .auth-toggle {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      background: #f0f3f8;
      border-radius: 60px;
      padding: 6px;
    }

    .auth-toggle button {
      flex: 1;
      padding: 14px;
      border-radius: 60px;
      border: none;
      font-weight: 600;
      background: transparent;
      color: #6b7280;
    }

    .auth-toggle button.active {
      background: #0066ff;
      color: white;
    }

    .error-msg {
      color: #dc2626;
      font-size: 14px;
      margin: 12px 0;
      text-align: center;
    }

    /* Map */
    .map-container {
      height: 40vh;
      width: 100%;
    }
    #map {
      height: 100%;
      width: 100%;
    }

    .slider-container {
      height: 10vh;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: white;
      border-bottom: 1px solid #f0f3f8;
    }

    .drawer-list {
      height: 50vh;
      background: white;
      border-radius: 32px 32px 0 0;
      padding: 16px;
      overflow-y: auto;
    }

    .pull-handle {
      width: 48px;
      height: 5px;
      background: #d0d5dd;
      border-radius: 10px;
      margin: 0 auto 16px;
    }

    .provider-list-item {
      display: flex;
      gap: 16px;
      padding: 12px;
      background: #fafbfc;
      border-radius: 24px;
      margin-bottom: 8px;
      align-items: center;
      cursor: pointer;
    }

    /* Messages */
    .conversation-item {
      display: flex;
      gap: 16px;
      padding: 16px;
      background: white;
      border-bottom: 1px solid #f0f3f8;
      align-items: center;
    }
    .conversation-img {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
    }
    .conversation-details { flex: 1; }
    .conversation-name { font-weight: 600; margin-bottom: 4px; }
    .last-message { color: #6b7280; font-size: 13px; }
    .blue-tick { color: #34b7f1; }
    .timestamp { font-size: 11px; color: #9ca3af; }

    /* Profile */
    .profile-header {
      display: flex;
      gap: 20px;
      padding: 20px;
      align-items: center;
    }
    .profile-stats {
      display: flex;
      gap: 24px;
      margin: 12px 0;
    }
    .stat-number { font-weight: 700; font-size: 20px; }
    .stat-label { color: #6b7280; font-size: 13px; }
    .bio-section {
      padding: 20px;
      background: #f8fafc;
      border-radius: 28px;
      margin: 16px;
    }
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 16px;
    }
    .portfolio-grid img {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 18px;
      object-fit: cover;
    }
    .star-rating-input {
      display: flex;
      gap: 8px;
      font-size: 30px;
      margin: 12px 0;
    }
    .star-rating-input span {
      cursor: pointer;
      color: #d1d5db;
    }
    .star-rating-input span.selected {
      color: #f5b342;
    }

    #sentinel { height: 10px; }
  </style>
</head>
<body>
<div id="app">
  <!-- AUTH SCREENS -->
  <div id="authContainer" class="auth-container">
    <div class="auth-toggle">
      <button id="toggleEmailSignup" class="active">Email</button>
      <button id="togglePhoneSignup">Phone</button>
    </div>

    <!-- Email Signup -->
    <div id="emailSignupView">
      <h2 style="margin-bottom: 24px;">Create account</h2>
      <input type="text" id="emailBusinessName" class="input-field" placeholder="Business name" value="Test Business">
      <input type="email" id="emailAddress" class="input-field" placeholder="Email" value="test@example.com">
      <input type="password" id="emailPassword" class="input-field" placeholder="Password" value="password123">
      <div style="margin: 12px 0;">Skills (select multiple)</div>
      <div id="emailSkillsContainer">
        <span class="skill-tag" data-skill="Barber">Barber</span>
        <span class="skill-tag" data-skill="Tech">Tech</span>
        <span class="skill-tag" data-skill="Design">Design</span>
        <span class="skill-tag" data-skill="Marketing">Marketing</span>
      </div>
      <button class="btn" id="signupWithEmailBtn">Sign up with Email</button>
    </div>

    <!-- Phone Signup -->
    <div id="phoneSignupView" class="hidden">
      <h2 style="margin-bottom: 24px;">Create with phone</h2>
      <input type="text" id="phoneBusinessName" class="input-field" placeholder="Business name" value="Test Phone Biz">
      <div class="phone-input-container">
        <select id="phoneCountryCode">
          <option value="+234">🇳🇬 +234</option>
          <option value="+1">🇺🇸 +1</option>
          <option value="+44">🇬🇧 +44</option>
          <option value="+81">🇯🇵 +81</option>
        </select>
        <input type="tel" id="phoneNumber" class="input-field" placeholder="Phone number" value="801234567">
      </div>
      <input type="password" id="phonePassword" class="input-field" placeholder="Password" value="password123">
      <div style="margin: 12px 0;">Skills (select multiple)</div>
      <div id="phoneSkillsContainer">
        <span class="skill-tag" data-skill="Barber">Barber</span>
        <span class="skill-tag" data-skill="Tech">Tech</span>
        <span class="skill-tag" data-skill="Design">Design</span>
        <span class="skill-tag" data-skill="Marketing">Marketing</span>
      </div>
      <div id="recaptcha-container"></div>
      <button class="btn" id="signupWithPhoneBtn">Sign up with Phone</button>
    </div>

    <!-- Login View -->
    <div id="loginView" class="hidden">
      <h2 style="margin-bottom: 24px;">Welcome back</h2>
      <input type="email" id="loginEmail" class="input-field" placeholder="Email" value="test@example.com">
      <input type="password" id="loginPassword" class="input-field" placeholder="Password" value="password123">
      <button class="btn" id="loginBtn">Log in</button>
      <p style="text-align: center; margin: 20px 0;">
        <button id="gotoSignupBtn" style="background: none; border: none; color: #0066ff;">Create account</button>
      </p>
    </div>

    <!-- Verify View -->
    <div id="verifyView" class="hidden">
      <h2>Verify your account</h2>
      <p id="verifyMessage" style="margin: 24px 0;">Verification sent</p>
      <div id="smsCodeInput" class="hidden">
        <input type="text" id="smsCode" class="input-field" placeholder="Enter SMS code">
        <button class="btn" id="verifySmsBtn">Verify Code</button>
      </div>
      <button class="btn" id="checkVerificationBtn">I've verified</button>
    </div>

    <div id="authError" class="error-msg"></div>
    <p style="text-align: center;">
      <button id="gotoLoginBtn" style="background: none; border: none; color: #0066ff;">Already have an account?</button>
    </p>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="main-app hidden">
    <div class="tab-content" id="tabContent">
      <!-- Home -->
      <div id="homeTab" class="tab-pane">
        <h3 style="padding: 20px 16px;">Discover best talents<br><span style="font-size: 16px; color: #6b7280;">closest to you</span></h3>
        <div id="homeGrid" class="grid-2"></div>
        <div id="sentinel"></div>
      </div>

      <!-- Search -->
      <div id="searchTab" class="tab-pane hidden">
        <div class="map-container">
          <div id="map"></div>
        </div>
        <div class="slider-container">
          <span>📍 <span id="radiusValue">3</span> km</span>
          <input type="range" id="radiusSlider" min="1" max="20" value="3">
        </div>
        <div class="drawer-list">
          <div class="pull-handle"></div>
          <div id="providerListDrawer"></div>
        </div>
      </div>

      <!-- Messages -->
      <div id="messagesTab" class="tab-pane hidden">
        <div id="conversationsList"></div>
      </div>

      <!-- Profile -->
      <div id="profileTab" class="tab-pane hidden">
        <div class="profile-header">
          <img id="profileImage" src="" style="width: 80px; height: 80px; border-radius: 50%;">
          <div>
            <div class="business-name" id="profileBusinessName"></div>
            <div class="profile-stats">
              <div><span class="stat-number" id="profileJobs">0</span> <span class="stat-label">jobs</span></div>
              <div><span class="stat-number" id="profileRating">0</span> <span class="stat-label">⭐</span></div>
            </div>
          </div>
        </div>

        <div class="bio-section">
          <textarea id="bioTextarea" maxlength="300" placeholder="Tell us about your services (max 300 words)" style="width: 100%; border: none; background: transparent;" rows="3"></textarea>
          <button class="btn-outline btn" id="saveBioBtn" style="margin-top: 8px;">Save bio</button>
        </div>

        <div id="missingContactContainer" style="padding: 0 16px 16px;"></div>

        <div style="padding: 16px;">
          <h4>Leave a review</h4>
          <div class="star-rating-input" id="starRatingInput">
            <span data-star="1">★</span><span data-star="2">★</span><span data-star="3">★</span><span data-star="4">★</span><span data-star="5">★</span>
          </div>
          <input type="text" id="reviewText" class="input-field" placeholder="Your review">
          <button class="btn" id="submitReviewBtn">Submit review</button>
        </div>

        <div class="portfolio-grid" id="portfolioGrid"></div>
      </div>

      <!-- Admin -->
      <div id="adminTab" class="tab-pane hidden">
        <div style="padding: 20px;">Admin panel</div>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-item active" data-tab="home"><span class="tab-icon">🏠</span>Home</button>
      <button class="tab-item" data-tab="search"><span class="tab-icon">🔍</span>Search</button>
      <button class="tab-item" data-tab="messages"><span class="tab-icon">💬</span>Chats</button>
      <button class="tab-item" data-tab="profile"><span class="tab-icon">👤</span>Profile</button>
      <button class="tab-item" data-tab="admin" id="adminTabBtn"><span class="tab-icon">⚙️</span>Admin</button>
    </div>
  </div>

  <!-- Bottom Sheet -->
  <div class="sheet-overlay" id="sheetOverlay"></div>
  <div class="bottom-sheet" id="quickViewSheet">
    <div class="sheet-handle"></div>
    <div id="sheetContent"></div>
  </div>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
  // Firebase imports
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { 
    getAuth, setPersistence, browserLocalPersistence,
    createUserWithEmailAndPassword, signInWithEmailAndPassword,
    onAuthStateChanged, sendEmailVerification,
    signInWithPhoneNumber, RecaptchaVerifier
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { 
    getFirestore, doc, setDoc, getDoc, updateDoc, addDoc,
    collection, query, orderBy, limit, startAfter, getDocs,
    where, GeoPoint 
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyD7dRYpXukVlyV6ipmCfbCXEJ4kp8t1Gmg",
    authDomain: "gigscourt.firebaseapp.com",
    projectId: "gigscourt",
    storageBucket: "gigscourt.firebasestorage.app",
    messagingSenderId: "1055157379736",
    appId: "1:1055157379736:web:215763c63606c2c5a966ed",
    measurementId: "G-BY1YBSYJHV"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  setPersistence(auth, browserLocalPersistence);

  // Cloudinary
  const CLOUD_NAME = 'dszdwnuua';
  const cloudUrl = (id, w = 400) => `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_${w},q_auto,f_auto/${id || 'default_avatar'}`;

  // State
  let currentUser = null;
  let lastVisible = null;
  let loadingMore = false;
  let lastActivity = Date.now();
  const ACTIVITY_TIMEOUT = 10 * 60 * 1000;
  let selectedEmailSkills = new Set();
  let selectedPhoneSkills = new Set();
  let map = null;
  let confirmationResult = null;

  // Session tracking
  const activityEvents = ['touchstart', 'pointerdown', 'scroll'];
  activityEvents.forEach(ev => 
    document.addEventListener(ev, () => {
      lastActivity = Date.now();
      localStorage.setItem('lastActive', lastActivity.toString());
    }, { passive: true })
  );

  // Tab persistence
  function saveTab(tabId) {
    localStorage.setItem('currentTab', tabId);
  }

  function getSavedTab() {
    return localStorage.getItem('currentTab') || 'home';
  }

  function switchTab(tabId) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
    document.getElementById(tabId + 'Tab').classList.remove('hidden');
    document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tab-item[data-tab="${tabId}"]`).classList.add('active');
    saveTab(tabId);
    if (tabId === 'home') loadProviders(true);
    if (tabId === 'search') setTimeout(initMap, 200);
  }

  // Tab click handlers
  document.querySelectorAll('.tab-item').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      switchTab(btn.dataset.tab);
    });
  });

  // Edge swipe
  let touchStart = { x: 0, y: 0 };
  document.addEventListener('touchstart', (e) => {
    touchStart.x = e.touches[0].clientX;
    touchStart.y = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    const width = window.innerWidth;
    if (Math.abs(dx) > 50 && Math.abs(dy) < 70 && (touchStart.x < width * 0.15 || touchStart.x > width * 0.85)) {
      const tabs = ['home', 'search', 'messages', 'profile', 'admin'];
      const current = tabs.find(t => !document.getElementById(t + 'Tab').classList.contains('hidden'));
      const idx = tabs.indexOf(current);
      if (dx > 0 && idx > 0) switchTab(tabs[idx - 1]);
      else if (dx < 0 && idx < tabs.length - 1) switchTab(tabs[idx + 1]);
    }
  }, { passive: true });

  // Skills selection
  document.querySelectorAll('#emailSkillsContainer .skill-tag').forEach(tag => {
    tag.addEventListener('click', (e) => {
      e.preventDefault();
      const skill = tag.dataset.skill;
      if (selectedEmailSkills.has(skill)) {
        selectedEmailSkills.delete(skill);
        tag.classList.remove('selected');
      } else {
        selectedEmailSkills.add(skill);
        tag.classList.add('selected');
      }
    });
  });

  document.querySelectorAll('#phoneSkillsContainer .skill-tag').forEach(tag => {
    tag.addEventListener('click', (e) => {
      e.preventDefault();
      const skill = tag.dataset.skill;
      if (selectedPhoneSkills.has(skill)) {
        selectedPhoneSkills.delete(skill);
        tag.classList.remove('selected');
      } else {
        selectedPhoneSkills.add(skill);
        tag.classList.add('selected');
      }
    });
  });

  // Auth UI toggles
  document.getElementById('toggleEmailSignup').addEventListener('click', () => {
    document.getElementById('toggleEmailSignup').classList.add('active');
    document.getElementById('togglePhoneSignup').classList.remove('active');
    document.getElementById('emailSignupView').classList.remove('hidden');
    document.getElementById('phoneSignupView').classList.add('hidden');
  });

  document.getElementById('togglePhoneSignup').addEventListener('click', () => {
    document.getElementById('togglePhoneSignup').classList.add('active');
    document.getElementById('toggleEmailSignup').classList.remove('active');
    document.getElementById('phoneSignupView').classList.remove('hidden');
    document.getElementById('emailSignupView').classList.add('hidden');
  });

  document.getElementById('gotoLoginBtn').addEventListener('click', () => {
    document.getElementById('emailSignupView').classList.add('hidden');
    document.getElementById('phoneSignupView').classList.add('hidden');
    document.getElementById('loginView').classList.remove('hidden');
  });

  document.getElementById('gotoSignupBtn').addEventListener('click', () => {
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('emailSignupView').classList.remove('hidden');
  });

  // Email signup
  document.getElementById('signupWithEmailBtn').addEventListener('click', async (e) => {
    e.preventDefault();
    const businessName = document.getElementById('emailBusinessName').value;
    const email = document.getElementById('emailAddress').value;
    const password = document.getElementById('emailPassword').value;
    const skills = Array.from(selectedEmailSkills);

    if (!businessName || !email || !password || skills.length === 0) {
      document.getElementById('authError').textContent = 'Please fill all fields and select skills';
      return;
    }

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, 'users', cred.user.uid), {
        businessName,
        email,
        phoneNumber: '',
        skills,
        profileImage: 'default_avatar',
        rating: 0,
        reviewCount: 0,
        jobsDone: 0,
        location: new GeoPoint(40.7128, -74.0060),
        createdAt: Date.now(),
        portfolioImages: ['sample1', 'sample2', 'sample3'],
        bio: '',
        signupMethod: 'email',
        emailVerified: false,
        phoneVerified: false
      });
      await sendEmailVerification(cred.user);
      document.getElementById('emailSignupView').classList.add('hidden');
      document.getElementById('verifyView').classList.remove('hidden');
      document.getElementById('verifyMessage').textContent = 'Verification link sent to your email';
    } catch (err) {
      document.getElementById('authError').textContent = err.message;
    }
  });

  // Phone signup
  document.getElementById('signupWithPhoneBtn').addEventListener('click', async () => {
    const businessName = document.getElementById('phoneBusinessName').value;
    const cc = document.getElementById('phoneCountryCode').value;
    const phone = document.getElementById('phoneNumber').value;
    const fullPhone = cc + phone;
    const password = document.getElementById('phonePassword').value;
    const skills = Array.from(selectedPhoneSkills);

    if (!businessName || !fullPhone || !password || skills.length === 0) {
      document.getElementById('authError').textContent = 'Please fill all fields';
      return;
    }

    try {
      window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
        size: 'invisible'
      });
      confirmationResult = await signInWithPhoneNumber(auth, fullPhone, window.recaptchaVerifier);
      document.getElementById('verifyMessage').textContent = `SMS sent to ${fullPhone}`;
      document.getElementById('smsCodeInput').classList.remove('hidden');
      document.getElementById('verifyView').classList.remove('hidden');
      
      localStorage.setItem('pendingPhoneUser', JSON.stringify({
        businessName, fullPhone, password, skills
      }));
    } catch (err) {
      document.getElementById('authError').textContent = err.message;
    }
  });

  // Verify SMS
  document.getElementById('verifySmsBtn')?.addEventListener('click', async () => {
    const code = document.getElementById('smsCode').value;
    try {
      const result = await confirmationResult.confirm(code);
      const user = result.user;
      const pending = JSON.parse(localStorage.getItem('pendingPhoneUser') || '{}');
      
      await setDoc(doc(db, 'users', user.uid), {
        businessName: pending.businessName,
        email: '',
        phoneNumber: pending.fullPhone,
        skills: pending.skills,
        profileImage: 'default_avatar',
        rating: 0,
        reviewCount: 0,
        jobsDone: 0,
        location: new GeoPoint(40.7128, -74.0060),
        createdAt: Date.now(),
        portfolioImages: ['sample1', 'sample2', 'sample3'],
        bio: '',
        signupMethod: 'phone',
        emailVerified: false,
        phoneVerified: true
      });
      
      localStorage.removeItem('pendingPhoneUser');
      document.getElementById('verifyView').classList.add('hidden');
      document.getElementById('authContainer').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      loadProviders(true);
      switchTab(getSavedTab());
    } catch (err) {
      document.getElementById('authError').textContent = err.message;
    }
  });

  // Login
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPassword').value;
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (err) {
      document.getElementById('loginError').textContent = err.message;
    }
  });

  // Check verification
  document.getElementById('checkVerificationBtn').addEventListener('click', async () => {
    if (auth.currentUser) {
      await auth.currentUser.reload();
      if (auth.currentUser.emailVerified) {
        document.getElementById('verifyView').classList.add('hidden');
        document.getElementById('authContainer').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        loadProviders(true);
        switchTab(getSavedTab());
      } else {
        alert('Email not verified yet');
      }
    }
  });

  // Load providers
  async function loadProviders(reset = false) {
    if (reset) {
      lastVisible = null;
      document.getElementById('homeGrid').innerHTML = '';
    }
    if (loadingMore) return;
    loadingMore = true;

    try {
      let q = query(collection(db, 'users'), orderBy('rating', 'desc'), orderBy('reviewCount', 'desc'), limit(6));
      if (lastVisible) q = query(q, startAfter(lastVisible));
      const snap = await getDocs(q);
      
      if (!snap.empty) {
        lastVisible = snap.docs[snap.docs.length - 1];
        snap.forEach(doc => {
          const d = doc.data();
          const card = document.createElement('div');
          card.className = 'provider-card';
          card.innerHTML = `
            <img class="card-img" src="${cloudUrl(d.profileImage)}" loading="lazy">
            <div class="business-name">${d.businessName || 'Business'}</div>
            <div class="rating-row"><span class="star">⭐</span> ${d.rating || 0} (${d.reviewCount || 0})</div>
            <div class="distance">1.2 km</div>
            <div class="skills">${(d.skills || []).slice(0, 2).join(', ')}</div>
          `;
          card.addEventListener('click', () => openQuickView(doc.id, d));
          document.getElementById('homeGrid').appendChild(card);
        });
      }
    } finally {
      loadingMore = false;
    }
  }

  // Quick view
  function openQuickView(id, data) {
    document.getElementById('sheetContent').innerHTML = `
      <div style="display: flex; gap: 16px; margin-bottom: 20px;">
        <img src="${cloudUrl(data.profileImage, 200)}" style="width: 70px; height: 70px; border-radius: 50%;">
        <div>
          <h3>${data.businessName}</h3>
          <div>⭐ ${data.rating || 0} (${data.reviewCount || 0}) · 1.2 km</div>
        </div>
      </div>
      <div style="margin-bottom: 16px;">${(data.skills || []).join(' · ')}</div>
      <div class="sheet-portfolio" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
        ${(data.portfolioImages || ['sample1', 'sample2', 'sample3']).slice(0, 3).map(img => `<img src="${cloudUrl(img, 200)}" style="width: 100%; aspect-ratio: 1; border-radius: 16px;">`).join('')}
      </div>
      <button class="btn" style="margin-top: 20px;">View Profile</button>
      <button class="btn-outline btn">Message</button>
    `;
    document.getElementById('sheetOverlay').classList.add('active');
    document.getElementById('quickViewSheet').classList.add('active');
  }

  // Close sheet
  document.getElementById('sheetOverlay').addEventListener('click', () => {
    document.getElementById('sheetOverlay').classList.remove('active');
    document.getElementById('quickViewSheet').classList.remove('active');
  });

  // Map
  function initMap() {
    if (map) return;
    map = L.map('map').setView([40.7128, -74.0060], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);
    loadProviderPins();
  }

  async function loadProviderPins() {
    const snap = await getDocs(collection(db, 'users'));
    const drawer = document.getElementById('providerListDrawer');
    drawer.innerHTML = '';
    
    snap.forEach(doc => {
      const d = doc.data();
      if (d.location) {
        L.marker([40.7128, -74.0060]).addTo(map)
          .bindPopup(d.businessName)
          .on('click', () => openQuickView(doc.id, d));
      }
      
      const item = document.createElement('div');
      item.className = 'provider-list-item';
      item.innerHTML = `
        <img src="${cloudUrl(d.profileImage, 100)}" style="width: 50px; height: 50px; border-radius: 25px;">
        <div><strong>${d.businessName}</strong><br>⭐ ${d.rating || 0} · 1.2 km</div>
      `;
      item.addEventListener('click', () => openQuickView(doc.id, d));
      drawer.appendChild(item);
    });
  }

  // 10-min reset
  setInterval(() => {
    if (currentUser && (Date.now() - lastActivity) > ACTIVITY_TIMEOUT) {
      switchTab('home');
      lastActivity = Date.now();
    }
  }, 30000);

  // Auth state
  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user && (user.emailVerified || user.phoneNumber)) {
      if (user.email === 'agboghidiaugust@gmail.com') {
        document.getElementById('adminTabBtn').style.display = 'flex';
      } else {
        document.getElementById('adminTabBtn').style.display = 'none';
      }
      
      document.getElementById('mainApp').classList.remove('hidden');
      document.getElementById('authContainer').classList.add('hidden');
      loadProviders(true);
      switchTab(getSavedTab());

      // Load profile
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (userDoc.exists()) {
        const data = userDoc.data();
        document.getElementById('profileBusinessName').textContent = data.businessName || '';
        document.getElementById('profileJobs').textContent = data.jobsDone || 0;
        document.getElementById('profileRating').textContent = data.rating || 0;
        document.getElementById('bioTextarea').value = data.bio || '';
        document.getElementById('profileImage').src = cloudUrl(data.profileImage, 200);
      }
    } else if (user && !user.emailVerified) {
      document.getElementById('verifyView').classList.remove('hidden');
      document.getElementById('emailSignupView').classList.add('hidden');
      document.getElementById('phoneSignupView').classList.add('hidden');
    } else {
      document.getElementById('mainApp').classList.add('hidden');
      document.getElementById('authContainer').classList.remove('hidden');
      document.getElementById('emailSignupView').classList.remove('hidden');
      document.getElementById('phoneSignupView').classList.add('hidden');
      document.getElementById('verifyView').classList.add('hidden');
    }
  });

  // Save bio
  document.getElementById('saveBioBtn').addEventListener('click', async () => {
    if (!auth.currentUser) return;
    const bio = document.getElementById('bioTextarea').value;
    await updateDoc(doc(db, 'users', auth.currentUser.uid), { bio });
    alert('Bio saved');
  });

  // Infinite scroll
  const sentinel = document.getElementById('sentinel');
  const observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !loadingMore) loadProviders();
  }, { threshold: 0.1 });
  observer.observe(sentinel);
</script>
</body>
</html>
