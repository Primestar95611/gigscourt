<!DOCTYPE html>

<html lang="en" dir="ltr">

<head>
  <!-- ═══════════════════════════════════════════════════
       GigsCourt — Service Marketplace PWA
       NO BUILD TOOL REQUIRED — React + Babel via CDN
       All JSX is transpiled in-browser by Babel Standalone
  ════════════════════════════════════════════════════════ -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Primary Meta -->

  <title>GigsCourt — Find Skilled Providers Near You</title>
  <meta name="description" content="GigsCourt connects you with top local barbers, stylists, tailors and more." />
  <meta name="theme-color" content="#FF385C" />

  <!-- PWA / Mobile -->

  <meta name="format-detection"             content="telephone=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title"   content="GigsCourt" />

  <!-- Open Graph -->

  <meta property="og:title"       content="GigsCourt — Find Skilled Providers Near You" />
  <meta property="og:description" content="Browse barbers, stylists, tailors by distance." />
  <meta property="og:type"        content="website" />

  <!-- Google Fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet" />

  <!-- ── Tailwind CSS CDN ─────────────────────────────── -->

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            red: { DEFAULT: '#FF385C', dark: '#E0294D', light: '#FF6B87' }
          },
          fontFamily: {
            display: ['"Clash Display"', 'sans-serif'],
            body:    ['"DM Sans"', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- ══════════════════════════════════════════════════════
       CRITICAL — React + ReactDOM (must load BEFORE App.js)
       These become window.React and window.ReactDOM globals.
       Babel then transforms JSX into React.createElement calls.
  ═══════════════════════════════════════════════════════════ -->

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- ══════════════════════════════════════════════════════
       Babel Standalone — transforms JSX in the browser.
       This is what makes <div> syntax work without webpack/Vite.
       All script tags with type="text/babel" are auto-processed.
  ═══════════════════════════════════════════════════════════ -->

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Styles -->

  <link rel="stylesheet" href="./styles.css" />

  <!-- Critical inline CSS — prevents FOUC before styles.css loads -->

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: #F8F8FA;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }
    #root { min-height: 100dvh; display: flex; flex-direction: column; }

    /* Splash loader */
    #app-loader {
      position: fixed; inset: 0; background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #app-loader.hidden { opacity: 0; pointer-events: none; }
    .loader-logo {
      font-family: 'Clash Display', sans-serif;
      font-size: 30px; font-weight: 700;
      color: #0D0D12; margin: 0; letter-spacing: -0.5px;
    }
    .loader-logo span { color: #FF385C; }
    .loader-tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: #9999AA; margin: 0;
    }
    .loader-spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid rgba(255,56,92,0.15);
      border-top-color: #FF385C;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes gcSpin { to { transform: rotate(360deg); } }
  </style>

</head>

<body>

  <!-- Splash — visible instantly while JS loads -->

  <div id="app-loader" aria-hidden="true">
    <p class="loader-logo">Gigs<span>Court</span></p>
    <div class="loader-spinner"></div>
    <p class="loader-tagline">Finding gigs near you…</p>
  </div>

  <!-- React mounts here -->

  <div id="root"></div>

  <!-- Loader dismiss logic — two methods for reliability -->

  <script>
    (function () {
      var loader = document.getElementById('app-loader');
      var root   = document.getElementById('root');

      function dismiss() {
        if (!loader || loader._dismissed) return;
        loader._dismissed = true;
        loader.classList.add('hidden');
        setTimeout(function () {
          if (loader.parentNode) loader.parentNode.removeChild(loader);
        }, 450);
      }

      // Method 1: fires the moment React renders into #root
      var obs = new MutationObserver(function () {
        if (root.hasChildNodes()) { dismiss(); obs.disconnect(); }
      });
      obs.observe(root, { childList: true });

      // Method 2: hard 6s fallback — clears no matter what
      setTimeout(function () { dismiss(); obs.disconnect(); }, 6000);
    })();
  </script>

  <!-- ══════════════════════════════════════════════════════
       Component files — MUST be type="text/babel" so Babel
       transforms the JSX before the browser tries to run it.

       ORDER MATTERS — dependencies load before dependents:
         1. Leaf components first (no internal imports)
         2. ProfilePage (imports ProfileGrid)
         3. App.js last (imports everything)

       Each file uses window globals instead of ES imports
       because Babel Standalone does not support import/export
       across separate script tags. State is passed via props.
  ═══════════════════════════════════════════════════════════ -->

  <!-- NOTE TO DEVELOPER:
       Because we're using Babel Standalone (no bundler),
       each component file must be inlined here OR converted
       to use the window global pattern shown in App.js.

       The cleanest production upgrade path is:
         npm create vite@latest gigscourt -- --template react
       Then move your .js files into src/ and run: npm run build
       Vercel will then serve a proper bundled app.

       For now, App.js below is self-contained and loads everything. -->

  <!-- ── Main App — self-contained, no external JS imports ── -->

  <script type="text/babel" src="./App.js"></script>

</body>
</html>
