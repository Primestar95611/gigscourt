function EmailChangeModal({ user, onClose }) {
  const [newEmail,  setNewEmail]  = React.useState('');
  const [password,  setPassword]  = React.useState('');
  const [loading,   setLoading]   = React.useState(false);
  const [error,     setError]     = React.useState('');
  const [success,   setSuccess]   = React.useState('');

  async function submit() {
    if (!newEmail || !password) { setError('Fill in both fields.'); return; }
    setLoading(true); setError('');
    try {
      await handleEmailChange(user, newEmail, password);
      setSuccess('✓ Verification sent to ' + newEmail + '. Click the link to confirm — it returns you to gigscourt.vercel.app');
    } catch(err) {
      setError(err.message.replace('Firebase: ','').replace(/\s*\(auth\/[^)]+\)/,'').trim());
    } finally { setLoading(false); }
  }

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{ background:'rgba(0,0,0,0.55)' }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="w-full max-w-md rounded-t-3xl bg-white px-6 pt-5 pb-10 fade-up">
        <div className="w-10 h-1 rounded-full bg-gray-200 mx-auto mb-4" />
        <h2 className="text-xl font-extrabold text-gray-900 mb-1" style={{ fontFamily:'Syne' }}>Change Email</h2>
        <p className="text-sm text-gray-400 mb-5">We&apos;ll send a verification link to your new address before swapping.</p>
        {success ? (
          <div className="rounded-xl px-4 py-4 text-sm" style={{ background:'rgba(0,196,140,0.08)', color:'var(--green)' }}>{success}</div>
        ) : (
          <>
            <input type="email" value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="New email address"
              className="w-full px-4 py-3.5 rounded-2xl text-sm outline-none mb-3"
              style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }} />
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Current password (to confirm)"
              className="w-full px-4 py-3.5 rounded-2xl text-sm outline-none mb-3"
              style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }} />
            {error && <div className="rounded-xl px-4 py-3 mb-3 text-sm" style={{ background:'rgba(255,56,92,0.06)', color:'var(--red)' }}>{error}</div>}
            <button onClick={submit} disabled={loading}
              className="w-full py-4 rounded-2xl font-bold text-white text-base flex items-center justify-center gap-2"
              style={{ background:'var(--red)', fontFamily:'Syne', opacity:loading?0.7:1 }}>
              {loading ? <><span className="w-5 h-5 rounded-full border-2 border-white border-t-transparent spin inline-block" /> Sending…</> : 'Send Verification Link'}
            </button>
          </>
        )}
        <button onClick={onClose} className="w-full mt-2 py-3 text-sm font-semibold" style={{ color:'#9CA3AF' }}>Cancel</button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  MFA ENROLL MODAL  — phone second factor enrollment
//  • Country code dropdown (default +234 Nigeria) + E.164 builder
//  • reCAPTCHA: reuses existing verifier if already rendered,
//    clears it on any error so user can retry without a refresh
// ════════════════════════════════════════════════════════════
function MFAEnrollModal({ user, onClose, onSuccess }) {
  const [phone,       setPhone]       = React.useState('');
  const [countryCode, setCountryCode] = React.useState('+234'); // default Nigeria
  const [otp,         setOtp]         = React.useState('');
  const [verId,       setVerId]       = React.useState('');
  const [step,        setStep]        = React.useState(1); // 1=enter phone, 2=enter OTP, 3=done
  const [loading,     setLoading]     = React.useState(false);
  const [error,       setError]       = React.useState('');

  // Same friendly error translator as AuthModal
  function cleanErr(e) {
    const code = (e.code || '');
    const map = {
      'auth/wrong-password':        'Incorrect password. Please try again.',
      'auth/invalid-credential':    'Incorrect password. Please try again.',
      'auth/user-not-found':        'No account found with this email.',
      'auth/invalid-email':         'Please enter a valid email address.',
      'auth/too-many-requests':     'Too many attempts. Please wait a moment and try again.',
      'auth/invalid-phone-number':  'Invalid phone number. Check the country code and digits.',
      'auth/missing-phone-number':  'Please enter a phone number.',
      'auth/quota-exceeded':        'SMS quota exceeded. Please try again later.',
      'auth/captcha-check-failed':  'reCAPTCHA check failed. Please close and reopen this dialog.',
    };
    if (map[code]) return map[code];
    return e.message.replace('Firebase: ','').replace(/\s*\(auth\/[^)]+\)/,'').trim();
  }

  async function sendOTP() {
    if (!phone) { setError('Enter your phone number (digits only, no leading 0).'); return; }
    // Build E.164: strip leading zeros, prepend selected country code
    const localNum = phone.replace(/^0+/, '');
    const e164     = countryCode + localNum;
    setLoading(true); setError('');
    try {
      const verificationId = await handleMFAEnroll(user, e164);
      setVerId(verificationId);
      setStep(2);
    } catch(err) {
      safeResetRecaptcha(); // clear so next attempt gets a fresh widget
      setError(cleanErr(err));
    }
    finally { setLoading(false); }
  }

  async function verifyOTP() {
    if (!otp) { setError('Enter the 6-digit code.'); return; }
    setLoading(true); setError('');
    try {
      await handleMFAEnrollVerify(user, verId, otp, 'Phone');
      setStep(3);
      setTimeout(() => { onSuccess(); onClose(); }, 2000);
    } catch(err) {
      safeResetRecaptcha();
      setError(cleanErr(err));
    }
    finally { setLoading(false); }
  }

  const Spinner = () => <span className="w-5 h-5 rounded-full border-2 border-white border-t-transparent spin inline-block" />;

  // Country options — same list as phone signup tab
  const COUNTRIES = [
    ['+234','🇳🇬 +234'],['+1','🇺🇸 +1'],['+44','🇬🇧 +44'],['+233','🇬🇭 +233'],
    ['+254','🇰🇪 +254'],['+27','🇿🇦 +27'],['+251','🇪🇹 +251'],['+255','🇹🇿 +255'],
    ['+256','🇺🇬 +256'],['+237','🇨🇲 +237'],['+225','🇨🇮 +225'],['+221','🇸🇳 +221'],
    ['+49','🇩🇪 +49'],['+33','🇫🇷 +33'],['+91','🇮🇳 +91'],['+86','🇨🇳 +86'],
    ['+55','🇧🇷 +55'],['+61','🇦🇺 +61'],
  ];

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{ background:'rgba(0,0,0,0.55)' }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="w-full max-w-md rounded-t-3xl bg-white px-6 pt-5 pb-10 fade-up">
        <div className="w-10 h-1 rounded-full bg-gray-200 mx-auto mb-4" />
        <h2 className="text-xl font-extrabold text-gray-900 mb-1" style={{ fontFamily:'Syne' }}>Enable 2-Factor Auth</h2>
        <p className="text-sm text-gray-400 mb-5">Add your phone as a second sign-in factor for extra security.</p>

        {step === 3 ? (
          <div className="flex flex-col items-center py-8 gap-3">
            <div className="w-16 h-16 rounded-full flex items-center justify-center" style={{ background:'rgba(0,196,140,0.12)' }}>
              <Icon.Check size={32} color="var(--green)" />
            </div>
            <p className="font-bold text-gray-800" style={{ fontFamily:'Syne' }}>MFA Enabled!</p>
            <p className="text-sm text-gray-500 text-center">Your account is now protected. You&apos;ll receive a confirmation email.</p>
          </div>

        ) : step === 1 ? (
          <>
            {/* Country code dropdown + local number — builds E.164 on send */}
            <div className="flex gap-2 mb-1">
              <select value={countryCode} onChange={e => setCountryCode(e.target.value)}
                className="px-3 py-3.5 rounded-2xl text-sm outline-none font-semibold flex-shrink-0"
                style={{ background:'#F9FAFB', border:'1px solid #E5E7EB', width:120 }}>
                {COUNTRIES.map(([code, label]) => (
                  <option key={code} value={code}>{label}</option>
                ))}
              </select>
              <input type="tel" value={phone}
                onChange={e => setPhone(e.target.value.replace(/[^\d]/g, ''))}
                placeholder="8012345678"
                className="flex-1 px-4 py-3.5 rounded-2xl text-sm outline-none"
                style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }} />
            </div>
            <p className="text-xs text-gray-400 mb-3 pl-1">Enter number without leading 0</p>

            {error && (
              <div className="rounded-xl px-4 py-3 mb-3 text-sm font-semibold"
                style={{ background:'rgba(255,56,92,0.07)', color:'var(--red)', border:'1px solid rgba(255,56,92,0.15)' }}>
                {error}
              </div>
            )}
            <button onClick={sendOTP} disabled={loading}
              className="w-full py-4 rounded-2xl font-bold text-white text-base flex items-center justify-center gap-2"
              style={{ background:'var(--red)', fontFamily:'Syne', opacity:loading?0.7:1 }}>
              {loading ? <><Spinner /> Sending code…</> : 'Send Verification Code'}
            </button>
            <p className="text-xs text-gray-400 text-center mt-2">Protected by invisible reCAPTCHA</p>
          </>

        ) : (
          <>
            <div className="rounded-xl px-4 py-3 mb-3 text-sm" style={{ background:'rgba(0,196,140,0.08)', color:'var(--green)' }}>
              Code sent to {countryCode}{phone}
            </div>
            <input type="text" inputMode="numeric" maxLength="6" value={otp}
              onChange={e => setOtp(e.target.value.replace(/\D/g,''))}
              placeholder="6-digit code"
              className="w-full px-4 py-3.5 rounded-2xl text-sm outline-none mb-3 text-center font-bold"
              style={{ background:'#F9FAFB', border:'1px solid #E5E7EB', fontSize:22, letterSpacing:8 }} />
            {error && (
              <div className="rounded-xl px-4 py-3 mb-3 text-sm font-semibold"
                style={{ background:'rgba(255,56,92,0.07)', color:'var(--red)', border:'1px solid rgba(255,56,92,0.15)' }}>
                {error}
              </div>
            )}
            <button onClick={verifyOTP} disabled={loading}
              className="w-full py-4 rounded-2xl font-bold text-white text-base flex items-center justify-center gap-2"
              style={{ background:'var(--red)', fontFamily:'Syne', opacity:loading?0.7:1 }}>
              {loading ? <><Spinner /> Verifying…</> : 'Confirm & Enable MFA'}
            </button>
            <button onClick={() => { setStep(1); setError(''); }} className="w-full mt-2 py-3 text-sm font-semibold" style={{ color:'#9CA3AF' }}>
              ← Change number
            </button>
          </>
        )}
        {step !== 3 && <button onClick={onClose} className="w-full mt-1 py-2.5 text-sm font-semibold" style={{ color:'#9CA3AF' }}>Cancel</button>}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  SECURITY DASHBOARD  — shows in ProfileTab for signed-in users
//  Displays: email verified status, MFA status, action buttons
// ════════════════════════════════════════════════════════════
function SecurityDashboard({ user, providerData, onOpenAuth }) {
  const [showEmailChange, setShowEmailChange] = React.useState(false);
  const [showMFAEnroll,   setShowMFAEnroll]   = React.useState(false);
  const [resendLoading,   setResendLoading]   = React.useState(false);
  const [resendMsg,       setResendMsg]       = React.useState('');
  const [mfaActive,       setMfaActive]       = React.useState(false);

  // Reload user to get fresh emailVerified state
  React.useEffect(() => {
    if (!user) return;
    user.reload().catch(() => {});
    // MFA enrolled: check enrolledFactors array
    setMfaActive(user.multiFactor?.enrolledFactors?.length > 0);
  }, [user?.uid]);

  async function resendVerification() {
    if (!user || resendLoading) return;
    setResendLoading(true); setResendMsg('');
    try {
      await user.sendEmailVerification({ url: APP_URL, handleCodeInApp: false });
      setResendMsg('✓ Verification email resent! Check your inbox.');
    } catch(err) {
      setResendMsg('⚠ ' + err.message.replace('Firebase: ','').replace(/\s*\(auth\/[^)]+\)/,'').trim());
    } finally {
      setResendLoading(false);
      setTimeout(() => setResendMsg(''), 5000);
    }
  }

  if (!user) {
    return (
      <div className="rounded-3xl p-5 mb-0" style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }}>
        <h3 className="font-bold text-gray-900 mb-1" style={{ fontFamily:'Syne' }}>🔐 Security</h3>
        <p className="text-sm text-gray-500 mb-4">Sign in to manage your account security.</p>
        <div className="flex gap-2">
          <button onClick={() => onOpenAuth('login')}
            className="flex-1 py-3 rounded-2xl text-sm font-bold text-white"
            style={{ background:'var(--red)', fontFamily:'Syne' }}>Sign In</button>
          <button onClick={() => onOpenAuth('signup')}
            className="flex-1 py-3 rounded-2xl text-sm font-bold"
            style={{ background:'#F3F4F6', color:'#374151' }}>Create Account</button>
        </div>
      </div>
    );
  }

  const isEmailUser = user.providerData?.some(p => p.providerId === 'password');
  const emailVerified = user.emailVerified;
  const phoneLinked   = user.providerData?.some(p => p.providerId === 'phone');

  // Security score: 0-3 checks
  const score = [emailVerified, mfaActive, (isEmailUser || phoneLinked)].filter(Boolean).length;
  const scoreColor = score === 3 ? 'var(--green)' : score === 2 ? '#F59E0B' : 'var(--red)';
  const scoreLabel = score === 3 ? 'Strong' : score === 2 ? 'Good' : 'Needs attention';

  return (
    <>
      {showEmailChange && <EmailChangeModal user={user} onClose={() => setShowEmailChange(false)} />}
      {showMFAEnroll   && <MFAEnrollModal   user={user} onClose={() => setShowMFAEnroll(false)}
        onSuccess={() => { setMfaActive(true); }} />}

      <h3 className="font-bold text-gray-900 mb-3" style={{ fontFamily:'Syne' }}>🔐 Security</h3>

      {/* Score bar */}
      <div className="rounded-2xl p-4 mb-3 flex items-center gap-4" style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }}>
        <div className="relative w-14 h-14 flex-shrink-0">
          <svg width="56" height="56" viewBox="0 0 56 56">
            <circle cx="28" cy="28" r="22" fill="none" stroke="#E5E7EB" strokeWidth="5" />
            <circle cx="28" cy="28" r="22" fill="none" stroke={scoreColor} strokeWidth="5"
              strokeDasharray={`${(score/3)*138.2} 138.2`} strokeLinecap="round" transform="rotate(-90 28 28)" />
          </svg>
          <div className="absolute inset-0 flex items-center justify-center">
            <span className="text-sm font-extrabold" style={{ color:scoreColor, fontFamily:'Syne' }}>{score}/3</span>
          </div>
        </div>
        <div>
          <p className="font-bold text-gray-900" style={{ fontFamily:'Syne' }}>Security: <span style={{ color:scoreColor }}>{scoreLabel}</span></p>
          <p className="text-xs text-gray-400 mt-0.5">
            {score === 3 ? 'All checks passed — your account is secured.' : 'Complete the checks below to strengthen your account.'}
          </p>
        </div>
      </div>

      {/* Security checks */}
      <div className="rounded-2xl overflow-hidden border mb-3" style={{ borderColor:'#E5E7EB' }}>

        {/* Email verified */}
        <div className="px-4 py-3.5 flex items-center justify-between" style={{ borderBottom:'1px solid #F3F4F6' }}>
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0"
              style={{ background: emailVerified ? 'rgba(0,196,140,0.12)' : 'rgba(255,56,92,0.08)' }}>
              <span>{emailVerified ? '✅' : '📧'}</span>
            </div>
            <div>
              <p className="text-sm font-semibold text-gray-800">Email Verified</p>
              <p className="text-xs text-gray-400">{emailVerified ? user.email : 'Check your inbox for the link'}</p>
            </div>
          </div>
          {!emailVerified && isEmailUser && (
            <button onClick={resendVerification} disabled={resendLoading}
              className="text-xs font-bold px-3 py-1.5 rounded-xl flex-shrink-0"
              style={{ background:'var(--red)', color:'white', opacity:resendLoading?0.6:1 }}>
              {resendLoading ? '…' : 'Resend'}
            </button>
          )}
          {emailVerified && (
            <span className="flex-shrink-0 flex items-center gap-1 px-2.5 py-1 rounded-xl text-xs font-bold"
              style={{ background:'rgba(0,196,140,0.12)', color:'var(--green)' }}>
              ✓ Verified
            </span>
          )}
        </div>

        {/* MFA status */}
        <div className="px-4 py-3.5 flex items-center justify-between" style={{ borderBottom:'1px solid #F3F4F6' }}>
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0"
              style={{ background: mfaActive ? 'rgba(0,196,140,0.12)' : 'rgba(255,56,92,0.08)' }}>
              <span>{mfaActive ? '🔐' : '🔓'}</span>
            </div>
            <div>
              <p className="text-sm font-semibold text-gray-800">2-Factor Authentication</p>
              <p className="text-xs text-gray-400">{mfaActive ? 'Phone MFA active' : 'Add a phone number as a second factor'}</p>
            </div>
          </div>
          {!mfaActive && isEmailUser && (
            <button onClick={() => setShowMFAEnroll(true)}
              className="text-xs font-bold px-3 py-1.5 rounded-xl flex-shrink-0"
              style={{ background:'var(--red)', color:'white' }}>
              Enable
            </button>
          )}
          {mfaActive && (
            <span className="flex-shrink-0 flex items-center gap-1 px-2.5 py-1 rounded-xl text-xs font-bold"
              style={{ background:'rgba(0,196,140,0.12)', color:'var(--green)' }}>
              ✓ Active
            </span>
          )}
        </div>

        {/* Change email — only for email/password users */}
        {isEmailUser && (
          <div className="px-4 py-3.5 flex items-center justify-between" style={{ borderBottom:'1px solid #F3F4F6' }}>
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0" style={{ background:'rgba(255,56,92,0.08)' }}>
                <span>✏️</span>
              </div>
              <div>
                <p className="text-sm font-semibold text-gray-800">Change Email</p>
                <p className="text-xs text-gray-400">Sends verification to new & old address</p>
              </div>
            </div>
            <button onClick={() => setShowEmailChange(true)}
              className="text-xs font-bold px-3 py-1.5 rounded-xl"
              style={{ background:'#F3F4F6', color:'#374151' }}>
              Update
            </button>
          </div>
        )}

        {/* Sign-in method */}
        <div className="px-4 py-3.5 flex items-center gap-3">
          <div className="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0"
            style={{ background:'rgba(0,196,140,0.12)' }}>
            <Icon.Firebase size={16} />
          </div>
          <div>
            <p className="text-sm font-semibold text-gray-800">Sign-in Method</p>
            <p className="text-xs text-gray-400">
              {isEmailUser && phoneLinked ? 'Email + Phone' : isEmailUser ? 'Email / Password' : 'Phone (SMS)'}
            </p>
          </div>
          <span className="ml-auto" style={{ color:'var(--green)', fontSize:18 }}>✓</span>
        </div>
      </div>

      {/* Resend feedback */}
      {resendMsg && (
        <div className="rounded-xl px-4 py-2.5 mb-3 text-xs font-medium fade-up"
          style={{ background: resendMsg.startsWith('✓') ? 'rgba(0,196,140,0.08)' : 'rgba(255,56,92,0.08)',
            color: resendMsg.startsWith('✓') ? 'var(--green)' : 'var(--red)' }}>
          {resendMsg}
        </div>
      )}
    </>
  );
}

// ════════════════════════════════════════════════════════════
//  AUTH MODAL  — Email/Password + Phone OTP + Forgot Password
// ════════════════════════════════════════════════════════════
function AuthModal({ mode, onClose, onSuccess }) {
  // authTab: 'email' | 'phone' | 'forgot'
  const [authTab,    setAuthTab]    = React.useState(mode === 'phone' ? 'phone' : 'email');
  const [name,       setName]       = React.useState('');
  const [email,      setEmail]      = React.useState('');
  const [password,   setPassword]   = React.useState('');
  const [phone,       setPhone]       = React.useState('');
  const [countryCode, setCountryCode] = React.useState('+234'); // default Nigeria
  const [otp,         setOtp]         = React.useState('');
  const [otpSent,     setOtpSent]     = React.useState(false);
  const [loading,    setLoading]    = React.useState(false);
  const [error,      setError]      = React.useState('');
  const [successMsg, setSuccessMsg] = React.useState('');
  const [done,       setDone]       = React.useState(false);
  const [doneLabel,  setDoneLabel]  = React.useState('');

  const isSignup = (mode === 'signup');

  // Translates Firebase error codes into plain human language
  function cleanErr(e) {
    const code = (e.code || '');
    const map = {
      'auth/wrong-password':        'Incorrect password. Please try again.',
      'auth/invalid-credential':    'Incorrect password. Please try again.',
      'auth/user-not-found':        'No account found with this email.',
      'auth/email-already-in-use':  'An account with this email already exists.',
      'auth/invalid-email':         'Please enter a valid email address.',
      'auth/weak-password':         'Password must be at least 6 characters.',
      'auth/too-many-requests':     'Too many attempts. Please wait a moment and try again.',
      'auth/network-request-failed':'Network error. Check your connection and try again.',
      'auth/popup-closed-by-user':  'Sign-in window was closed. Please try again.',
      'auth/invalid-phone-number':  'Invalid phone number. Check the country code and digits.',
      'auth/missing-phone-number':  'Please enter a phone number.',
      'auth/quota-exceeded':        'SMS quota exceeded. Please try again later.',
      'auth/captcha-check-failed':  'reCAPTCHA check failed. Please refresh and try again.',
    };
    if (map[code]) return map[code];
    // Fallback: strip Firebase boilerplate from the raw message
    return e.message.replace('Firebase: ','').replace(/\s*\(auth\/[^)]+\)/,'').trim();
  }

  // ── Email / Password flow ──────────────────────────────────
  async function submitEmail() {
    if (!email || !password) { setError('Please fill in all fields.'); return; }
    if (isSignup && !name) { setError('Please enter your name.'); return; }
    setLoading(true); setError('');
    try {
      const user = isSignup
        ? await handleFirebaseSignup(email, password, name)
        : await handleFirebaseLogin(email, password);
      if (isSignup) {
        setDoneLabel('Account created! Check your email to verify.');
      } else {
        setDoneLabel('Signed in!');
      }
      setDone(true);
      setTimeout(() => { onSuccess(user); onClose(); }, 2000);
    } catch(err) { setError(cleanErr(err)); }
    finally { setLoading(false); }
  }

  // ── Forgot password flow ──────────────────────────────────
  async function submitForgot() {
    if (!email) { setError('Enter your email address first.'); return; }
    setLoading(true); setError('');
    try {
      await handlePasswordReset(email);
      setSuccessMsg('✓ Reset link sent! Check your inbox — it links back to gigscourt.vercel.app');
    } catch(err) { setError(cleanErr(err)); }
    finally { setLoading(false); }
  }

  // ── Phone OTP flow — Step 1: Send OTP ─────────────────────
  async function submitPhoneSend() {
    if (!phone) { setError('Enter your phone number (digits only, no leading 0).'); return; }
    // Build E.164: strip any leading zeros from local number, prepend country code
    const localNum  = phone.replace(/^0+/, '');
    const e164      = countryCode + localNum;
    setLoading(true); setError('');
    try {
      await handlePhoneSendOTP(e164);
      setOtpSent(true);
      setSuccessMsg('✓ OTP sent! Check your messages.');
    } catch(err) { setError(cleanErr(err)); }
    finally { setLoading(false); }
  }

  // ── Phone OTP flow — Step 2: Verify OTP ───────────────────
  async function submitPhoneVerify() {
    if (!otp) { setError('Enter the 6-digit code.'); return; }
    setLoading(true); setError('');
    try {
      const user = await handlePhoneVerifyOTP(otp, name || null);
      setDoneLabel('Phone verified! Welcome to GigsCourt.');
      setDone(true);
      setTimeout(() => { onSuccess(user); onClose(); }, 2000);
    } catch(err) { setError(cleanErr(err)); }
    finally { setLoading(false); }
  }

  const Spinner = () => <span className="w-5 h-5 rounded-full border-2 border-white border-t-transparent spin inline-block" />;

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{ background:'rgba(0,0,0,0.55)' }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="w-full max-w-md rounded-t-3xl bg-white px-6 pt-5 pb-10 fade-up" style={{ maxHeight:'92vh', overflowY:'auto' }}>
        <div className="w-10 h-1 rounded-full bg-gray-200 mx-auto mb-4" />

        {/* Done state */}
        {done ? (
          <div className="flex flex-col items-center py-10 gap-3">
            <div className="w-16 h-16 rounded-full flex items-center justify-center" style={{ background:'rgba(0,196,140,0.12)' }}>
              <Icon.Check size={32} color="var(--green)" />
            </div>
            <p className="font-bold text-gray-800 text-center" style={{ fontFamily:'Syne' }}>{doneLabel}</p>
          </div>
        ) : (
          <>
            {/* Header */}
            <h2 className="text-xl font-extrabold text-gray-900 mb-1" style={{ fontFamily:'Syne' }}>
              {authTab === 'forgot' ? 'Reset Password' : isSignup ? 'Join GigsCourt' : 'Welcome Back'}
            </h2>
            <p className="text-sm text-gray-400 mb-4">
              {authTab === 'forgot' ? "We'll email a secure reset link"
                : authTab === 'phone' ? (otpSent ? 'Enter the code we texted you' : "Enter your number — we'll send a code")
                : isSignup ? 'Create your provider account' : 'Sign in to continue'}
            </p>

            {/* Tab switcher — shown on non-forgot screens */}
            {authTab !== 'forgot' && (
              <div className="flex gap-2 mb-5">
                {[{id:'email',label:'📧 Email'},{id:'phone',label:'📱 Phone'}].map(t => (
                  <button key={t.id} onClick={() => { setAuthTab(t.id); setError(''); setSuccessMsg(''); }}
                    className="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all"
                    style={{
                      background: authTab === t.id ? 'var(--red)' : '#F3F4F6',
                      color:      authTab === t.id ? 'white' : '#6B7280',
                    }}>
                    {t.label}
                  </button>
                ))}
              </div>
            )}

            {/* Error / success banners */}
            {error && (
              <div className="rounded-xl px-4 py-3 mb-3 text-sm font-semibold"
                style={{ background:'rgba(255,56,92,0.07)', color:'var(--red)', border:'1px solid rgba(255,56,92,0.18)' }}>
                {error}
              </div>
            )}
            {successMsg && (
              <div className="rounded-xl px-4 py-3 mb-3 text-sm" style={{ background:'rgba(0,196,140,0.08)', color:'var(--green)' }}>
                {successMsg}
              </div>
            )}

            {/* ── EMAIL TAB ── */}
            {authTab === 'email' && (
              <>
                {isSignup && (
                  <input value={name} onChange={e => setName(e.target.value)} placeholder="Full Name"
                    className="w-full px-4 py-3.5 rounded-2xl text-sm outline-none mb-3"
                    style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }} />
                )}
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Email address"
                  className="w-full px-4 py-3.5 rounded-2xl text-sm outline-none mb-3"
                  style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }} />
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Password (min 6 chars)"
                  className="w-full px-4 py-3.5 rounded-2xl text-sm outline-none mb-3"
                  style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }} />

                {/* Forgot password link — login only */}
                {!isSignup && (
                  <button onClick={() => { setAuthTab('forgot'); setError(''); setSuccessMsg(''); }}
                    className="w-full text-right text-xs mb-4 font-semibold"
                    style={{ color:'var(--red)' }}>
                    Forgot password?
                  </button>
                )}

                <button onClick={submitEmail} disabled={loading}
                  className="w-full py-4 rounded-2xl font-bold text-white text-base flex items-center justify-center gap-2"
                  style={{ background:'var(--red)', fontFamily:'Syne', opacity:loading?0.7:1 }}>
                  {loading ? <><Spinner /> Processing…</> : (isSignup ? 'Create Account' : 'Sign In')}
                </button>

                {isSignup && (
                  <p className="text-xs text-gray-400 text-center mt-3">
                    A verification email will be sent to confirm your address.
                  </p>
                )}
              </>
            )}

            {/* ── PHONE TAB ── */}
            {authTab === 'phone' && (
              <>
                {!otpSent ? (
                  <>
                    {isSignup && (
                      <input value={name} onChange={e => setName(e.target.value)} placeholder="Your Name (optional)"
                        className="w-full px-4 py-3.5 rounded-2xl text-sm outline-none mb-3"
                        style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }} />
                    )}

                    {/* ── Country code dropdown + number input (E.164 builder) ── */}
                    <div className="flex gap-2 mb-3">
                      <select value={countryCode} onChange={e => setCountryCode(e.target.value)}
                        className="px-3 py-3.5 rounded-2xl text-sm outline-none font-semibold flex-shrink-0"
                        style={{ background:'#F9FAFB', border:'1px solid #E5E7EB', width:120 }}>
                        <option value="+234">🇳🇬 +234</option>
                        <option value="+1">🇺🇸 +1</option>
                        <option value="+44">🇬🇧 +44</option>
                        <option value="+233">🇬🇭 +233</option>
                        <option value="+254">🇰🇪 +254</option>
                        <option value="+27">🇿🇦 +27</option>
                        <option value="+251">🇪🇹 +251</option>
                        <option value="+255">🇹🇿 +255</option>
                        <option value="+256">🇺🇬 +256</option>
                        <option value="+237">🇨🇲 +237</option>
                        <option value="+225">🇨🇮 +225</option>
                        <option value="+221">🇸🇳 +221</option>
                        <option value="+49">🇩🇪 +49</option>
                        <option value="+33">🇫🇷 +33</option>
                        <option value="+91">🇮🇳 +91</option>
                        <option value="+86">🇨🇳 +86</option>
                        <option value="+55">🇧🇷 +55</option>
                        <option value="+61">🇦🇺 +61</option>
                      </select>
                      <input type="tel" value={phone}
                        onChange={e => setPhone(e.target.value.replace(/[^\d]/g, ''))}
                        placeholder="8012345678"
                        className="flex-1 px-4 py-3.5 rounded-2xl text-sm outline-none"
                        style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }} />
                    </div>
                    <p className="text-xs text-gray-400 mb-3 -mt-1 pl-1">
                      Enter number without leading 0 — e.g. 8012345678
                    </p>

                    {/* Button triggers invisible reCAPTCHA, then Firebase OTP */}
                    <div id="recaptcha-container-inline" />
                    <button onClick={submitPhoneSend} disabled={loading}
                      className="w-full py-4 rounded-2xl font-bold text-white text-base flex items-center justify-center gap-2"
                      style={{ background:'var(--red)', fontFamily:'Syne', opacity:loading?0.7:1 }}>
                      {loading ? <><Spinner /> Sending OTP…</> : 'Send Verification Code'}
                    </button>
                    <p className="text-xs text-gray-400 text-center mt-3">
                      Protected by invisible reCAPTCHA · standard SMS rates may apply
                    </p>
                  </>
                ) : (
                  <>
                    <div className="rounded-xl px-4 py-3 mb-3 text-sm font-semibold flex items-center gap-2"
                      style={{ background:'rgba(0,196,140,0.08)', color:'var(--green)' }}>
                      <Icon.Check size={15} color="var(--green)" />
                      OTP sent to {countryCode}{phone}
                    </div>
                    <input type="text" inputMode="numeric" maxLength="6" value={otp}
                      onChange={e => setOtp(e.target.value.replace(/\D/g,''))}
                      placeholder="6-digit code"
                      className="w-full px-4 py-3.5 rounded-2xl text-sm outline-none mb-3 text-center font-bold"
                      style={{ background:'#F9FAFB', border:'1px solid #E5E7EB', fontSize:22, letterSpacing:8 }} />
                    <button onClick={submitPhoneVerify} disabled={loading}
                      className="w-full py-4 rounded-2xl font-bold text-white text-base flex items-center justify-center gap-2"
                      style={{ background:'var(--red)', fontFamily:'Syne', opacity:loading?0.7:1 }}>
                      {loading ? <><Spinner /> Verifying…</> : 'Verify & Sign In'}
                    </button>
                    <button onClick={() => { setOtpSent(false); setOtp(''); setSuccessMsg(''); }}
                      className="w-full mt-2 py-3 text-sm font-semibold" style={{ color:'#9CA3AF' }}>
                      ← Change number
                    </button>
                  </>
                )}
              </>
            )}

            {/* ── FORGOT PASSWORD TAB ── */}
            {authTab === 'forgot' && (
              <>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Your email address"
                  className="w-full px-4 py-3.5 rounded-2xl text-sm outline-none mb-3"
                  style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }} />
                <button onClick={submitForgot} disabled={loading || !!successMsg}
                  className="w-full py-4 rounded-2xl font-bold text-white text-base flex items-center justify-center gap-2"
                  style={{ background:'var(--red)', fontFamily:'Syne', opacity:(loading||!!successMsg)?0.7:1 }}>
                  {loading ? <><Spinner /> Sending…</> : 'Send Reset Link'}
                </button>
                <button onClick={() => { setAuthTab('email'); setError(''); setSuccessMsg(''); }}
                  className="w-full mt-2 py-3 text-sm font-semibold" style={{ color:'#9CA3AF' }}>
                  ← Back to Sign In
                </button>
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  PROFILE / DASHBOARD TAB  — live availability toggle
// ════════════════════════════════════════════════════════════
function ProfileTab({ currentUser }) {
  const [user,        setUser]        = React.useState(currentUser);
  const [isAvailable, setIsAvailable] = React.useState(true);
  const [toggling,    setToggling]    = React.useState(false);
  const [toggleMsg,   setToggleMsg]   = React.useState('');
  const [authModal,   setAuthModal]   = React.useState(null);

  // Portfolio upload state (for Quick Actions tile)
  const [uploading,   setUploading]   = React.useState(false);
  const [uploadPct,   setUploadPct]   = React.useState(0);
  const [uploadMsg,   setUploadMsg]   = React.useState('');

  // Dashboard identity upload state (cover + avatar)
  const [dashCoverUploading,  setDashCoverUploading]  = React.useState(false);
  const [dashCoverPct,        setDashCoverPct]        = React.useState(0);
  const [dashCoverPreview,    setDashCoverPreview]    = React.useState(null);
  const [dashAvatarUploading, setDashAvatarUploading] = React.useState(false);
  const [dashAvatarPct,       setDashAvatarPct]       = React.useState(0);
  const [dashAvatarPreview,   setDashAvatarPreview]   = React.useState(null);
  const [dashIdentityMsg,     setDashIdentityMsg]     = React.useState('');
  // Live Firestore snapshot of the provider doc (for reading updated coverPhoto / profileImage)
  const [dashProviderData,    setDashProviderData]    = React.useState(null);

  // Keep auth in sync
  React.useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => setUser(u));
    return () => unsub();
  }, []);

  // Subscribe to this user's provider doc (availability + identity fields)
  React.useEffect(() => {
    if (!user) return;
    const unsub = db.collection('providers').doc(user.uid)
      .onSnapshot(snap => {
        if (snap.exists) {
          const data = snap.data();
          setIsAvailable(data.available ?? true);
          setDashProviderData(data);
        }
      }, err => console.warn('[Firestore] Profile listen:', err.message));
    return () => unsub();
  }, [user?.uid]);

  // ── Identity upload picker for Dashboard cover/avatar ──
  function pickDashIdentity(field, setUploadingFn, setPctFn, setPreviewFn) {
    if (!user) return;
    const inp = document.createElement('input');
    inp.type   = 'file';
    inp.accept = 'image/jpeg,image/png,image/webp';
    inp.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) {
        setDashIdentityMsg('⚠ Image must be under 10 MB');
        setTimeout(() => setDashIdentityMsg(''), 3000);
        return;
      }
      const blobUrl = URL.createObjectURL(file);
      setPreviewFn(blobUrl);
      setUploadingFn(true); setPctFn(0);
      setDashIdentityMsg(field === 'coverPhoto' ? 'Uploading cover photo…' : 'Uploading avatar…');
      try {
        await uploadIdentityImage(file, user.uid, field, pct => setPctFn(pct));
        setPreviewFn(null);
        URL.revokeObjectURL(blobUrl);
        // onSnapshot will pick up the new URL from Firestore automatically
        setDashIdentityMsg(field === 'coverPhoto' ? '✓ Cover photo updated!' : '✓ Avatar updated!');
      } catch(err) {
        console.error('[Dashboard identity]', err.message);
        setPreviewFn(null);
        URL.revokeObjectURL(blobUrl);
        setDashIdentityMsg('⚠ Upload failed — try again');
      } finally {
        setUploadingFn(false); setPctFn(0);
        setTimeout(() => setDashIdentityMsg(''), 3500);
      }
    };
    inp.click();
  }

  // ── LIVE TOGGLE — writes to Firestore ──
  async function handleAvailabilityToggle(val) {
    if (!user) {
      setToggleMsg('⚠ Sign in to manage your status.');
      setTimeout(()=>setToggleMsg(''), 3000);
      return;
    }
    setToggling(true);
    try {
      await updateProviderAvailability(user.uid, val);
      setIsAvailable(val);
      setToggleMsg(val ? '✓ You\'re now visible to clients!' : '✓ Status set to Busy.');
    } catch(err) {
      setToggleMsg('⚠ Update failed — check your connection.');
      console.error('[Toggle]', err.message);
    } finally {
      setToggling(false);
      setTimeout(()=>setToggleMsg(''), 3000);
    }
  }

  // ── CLOUDINARY UPLOAD — Quick Actions portfolio tile ──
  function handleUploadPortfolio() {
    if (!user) { alert('Sign in first to upload portfolio images.'); return; }
    if (uploading) return;

    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/jpeg,image/png,image/webp,image/gif';
    inp.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) {
        setUploadMsg('⚠ Image must be under 10 MB');
        setTimeout(() => setUploadMsg(''), 3500);
        return;
      }
      setUploading(true); setUploadPct(0);
      setUploadMsg('Uploading to Cloudinary…');
      try {
        await uploadToCloudinary(file, user.uid, pct => { setUploadPct(pct); setUploadMsg(`Uploading… ${pct}%`); });
        setUploadMsg('✓ Photo added! View it on your profile.');
      } catch(err) {
        console.error('[Upload]', err.message);
        setUploadMsg('⚠ Upload failed — try again');
      } finally {
        setUploading(false); setUploadPct(0);
        setTimeout(() => setUploadMsg(''), 4000);
      }
    };
    inp.click();
  }

  const displayName  = user?.displayName || 'Guest User';
  const displayEmail = user?.email       || 'Not signed in';

  return (
    <div className="pb-28">
      {authModal && (
        <AuthModal mode={authModal} onClose={()=>setAuthModal(null)} onSuccess={u=>setUser(u)} />
      )}
      <div className="px-5 pt-6">
        <div className="flex items-center justify-between mb-5">
          <h1 className="text-2xl font-extrabold text-gray-900" style={{ fontFamily:'Syne' }}>Dashboard</h1>
          <button className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background:'#F3F4F6' }}>
            <Icon.Settings size={18} color="#6B7280" />
          </button>
        </div>

        {/* Dark provider card */}
        <div className="rounded-3xl overflow-hidden mb-5"
          style={{ background:'linear-gradient(135deg,#1A1A2E 0%,#2D2D44 100%)', boxShadow:'0 8px 32px rgba(26,26,46,0.3)' }}>

          {/* ── COVER PHOTO STRIP — clickable for signed-in users ── */}
          <div
            className="relative"
            style={{ height:110, cursor: user ? 'pointer' : 'default' }}
            onClick={() => user && !dashCoverUploading && pickDashIdentity('coverPhoto', setDashCoverUploading, setDashCoverPct, setDashCoverPreview)}
          >
            <img
              src={dashCoverPreview || (user && dashProviderData?.coverPhoto) || 'https://images.unsplash.com/photo-1521791136064-7986c2920216?w=800&q=80'}
              alt="cover"
              className="w-full h-full object-cover"
              style={{ opacity: dashCoverUploading ? 0.55 : 1, transition:'opacity 0.3s' }}
            />
            {/* Dark tint so the card gradient still shows through */}
            <div className="absolute inset-0" style={{ background:'rgba(26,26,46,0.55)' }} />

            {/* Edit badge */}
            {user && !dashCoverUploading && (
              <div className="absolute top-2 right-3 flex items-center gap-1 px-2.5 py-1 rounded-xl"
                style={{ background:'rgba(255,56,92,0.85)', backdropFilter:'blur(4px)' }}>
                <Icon.Camera size={11} color="white" />
                <span className="text-white text-xs font-bold" style={{ fontFamily:'Syne' }}>Edit Cover</span>
              </div>
            )}

            {/* Cover upload progress */}
            {dashCoverUploading && (
              <>
                <div className="absolute inset-0 flex items-center justify-center gap-2">
                  <span className="w-5 h-5 rounded-full border-2 border-white border-t-transparent spin inline-block" />
                  <span className="text-white text-sm font-bold" style={{ fontFamily:'Syne' }}>{dashCoverPct}%</span>
                </div>
                <div className="absolute bottom-0 left-0 right-0" style={{ height:3, background:'rgba(255,255,255,0.15)' }}>
                  <div className="h-full transition-all" style={{ width:`${dashCoverPct}%`, background:'var(--red)' }} />
                </div>
              </>
            )}
          </div>

          {/* Card body */}
          <div className="p-5">
            {/* Avatar + identity */}
            <div className="flex items-center gap-4 mb-5 -mt-10">
              {/* ── AVATAR — clickable for signed-in users ── */}
              <div
                className="relative flex-shrink-0"
                style={{ cursor: user ? 'pointer' : 'default' }}
                onClick={() => user && !dashAvatarUploading && pickDashIdentity('profileImage', setDashAvatarUploading, setDashAvatarPct, setDashAvatarPreview)}
              >
                <img
                  src={dashAvatarPreview || (user && dashProviderData?.profileImage) || (user ? `https://i.pravatar.cc/300?u=${user.uid}` : 'https://i.pravatar.cc/300?img=60')}
                  alt="me"
                  className="w-16 h-16 rounded-2xl object-cover border-2 border-white"
                  style={{ opacity: dashAvatarUploading ? 0.5 : 1, transition:'opacity 0.3s', boxShadow:'0 4px 12px rgba(0,0,0,0.3)' }}
                />
                {/* Red camera badge — idle */}
                {user && !dashAvatarUploading && (
                  <div className="absolute -bottom-1 -right-1 w-6 h-6 rounded-full flex items-center justify-center border-2 border-white"
                    style={{ background:'var(--red)', boxShadow:'0 2px 6px rgba(255,56,92,0.5)' }}>
                    <Icon.Camera size={11} color="white" />
                  </div>
                )}
                {/* Avatar upload ring */}
                {dashAvatarUploading && (
                  <div className="absolute inset-0 rounded-2xl flex items-center justify-center"
                    style={{ background:'rgba(0,0,0,0.5)' }}>
                    <svg width="32" height="32" viewBox="0 0 32 32">
                      <circle cx="16" cy="16" r="12" fill="none" stroke="rgba(255,255,255,0.25)" strokeWidth="3"/>
                      <circle cx="16" cy="16" r="12" fill="none" stroke="white" strokeWidth="3"
                        strokeDasharray={`${(dashAvatarPct/100)*75.4} 75.4`}
                        strokeLinecap="round" transform="rotate(-90 16 16)"/>
                    </svg>
                  </div>
                )}
              </div>

              <div className="flex-1 min-w-0">
                <h2 className="text-white font-bold text-lg truncate" style={{ fontFamily:'Syne' }}>{displayName}</h2>
                <p className="text-gray-400 text-xs truncate">{displayEmail}</p>
                {user && (
                  <div className="flex items-center gap-1 mt-1">
                    <Icon.Firebase size={11} />
                    <span className="text-xs" style={{ color:'var(--green)' }}>Firebase Auth active</span>
                  </div>
                )}
              </div>
            </div>

            {/* Dashboard identity upload feedback */}
            {dashIdentityMsg && (
              <div className="mb-4 rounded-xl px-3 py-2 text-xs font-medium fade-up flex items-center gap-2"
                style={{
                  background: dashIdentityMsg.startsWith('✓') ? 'rgba(0,196,140,0.15)' : dashIdentityMsg.startsWith('⚠') ? 'rgba(255,56,92,0.15)' : 'rgba(255,255,255,0.08)',
                  color: dashIdentityMsg.startsWith('✓') ? 'var(--green)' : dashIdentityMsg.startsWith('⚠') ? '#FF6B85' : 'white',
                }}>
                {dashIdentityMsg}
              </div>
            )}

            {/* Stats */}
            <div className="grid grid-cols-3 gap-3 mb-5">
              {[{l:'Bookings',v:user?'24':'—'},{l:'Earnings',v:user?'$1,840':'—'},{l:'Rating',v:'4.9'}].map(s=>(
                <div key={s.l} className="rounded-2xl p-3 text-center" style={{ background:'rgba(255,255,255,0.07)' }}>
                  <p className="text-white font-bold" style={{ fontFamily:'Syne' }}>{s.v}</p>
                  <p className="text-gray-400 text-xs mt-0.5">{s.l}</p>
                </div>
              ))}
            </div>

            {/* ── LIVE AVAILABILITY TOGGLE ── */}
            <div className="rounded-2xl p-4" style={{ background:'rgba(255,255,255,0.07)' }}>
              <div className="flex items-center justify-between">
                <div className="flex-1">
                  <p className="text-white font-semibold text-sm">Availability Status</p>
                  <p className="text-gray-400 text-xs mt-0.5">
                    {user
                      ? (isAvailable ? 'Visible to nearby clients' : 'Hidden from search')
                      : 'Sign in to manage status'}
                  </p>
                </div>
                <div className="flex items-center gap-2 ml-3">
                  <StatusBadge available={isAvailable} />
                  <ToggleSwitch value={isAvailable} onChange={handleAvailabilityToggle} disabled={toggling} />
                </div>
              </div>
              {/* Firestore write feedback message */}
              {(toggleMsg || toggling) && (
                <div className="mt-3 rounded-xl px-3 py-2 text-xs font-medium fade-up flex items-center gap-2"
                  style={{ background:'rgba(255,255,255,0.1)', color: toggleMsg.startsWith('✓') ? 'var(--green)' : toggleMsg.startsWith('⚠') ? '#FFA000' : '#FFF' }}>
                  {toggling && <span className="w-3 h-3 rounded-full border border-white border-t-transparent spin inline-block flex-shrink-0" />}
                  {toggleMsg || 'Saving to Firestore…'}
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Quick actions */}
        <h3 className="font-bold text-gray-900 mb-3" style={{ fontFamily:'Syne' }}>Quick Actions</h3>

        {/* Cloudinary upload feedback — shown while uploading from the tile */}
        {(uploadMsg || uploading) && (
          <div className="mb-3 rounded-2xl overflow-hidden" style={{ border:'1px solid #E5E7EB' }}>
            <div className="px-4 py-3 flex items-center gap-3"
              style={{ background: uploadMsg.startsWith('✓') ? 'rgba(0,196,140,0.06)' : uploadMsg.startsWith('⚠') ? 'rgba(255,56,92,0.06)' : '#F9FAFB' }}>
              {uploading
                ? <span className="w-5 h-5 rounded-full border-2 border-t-transparent spin inline-block flex-shrink-0"
                    style={{ borderColor:'var(--red)', borderTopColor:'transparent' }} />
                : <span className="text-base">{uploadMsg.startsWith('✓') ? '✅' : '⚠️'}</span>
              }
              <div className="flex-1 min-w-0">
                <p className="text-sm font-semibold text-gray-800 truncate"
                  style={{ color: uploadMsg.startsWith('✓') ? 'var(--green)' : uploadMsg.startsWith('⚠') ? 'var(--red)' : '#374151' }}>
                  {uploadMsg || `Uploading… ${uploadPct}%`}
                </p>
                {uploading && (
                  <div className="mt-1.5 rounded-full overflow-hidden" style={{ height:3, background:'#E5E7EB' }}>
                    <div className="h-full rounded-full transition-all" style={{ width:`${uploadPct}%`, background:'var(--red)' }} />
                  </div>
                )}
              </div>
              {uploading && (
                <span className="text-xs font-bold flex-shrink-0" style={{ color:'var(--red)', fontFamily:'Syne' }}>{uploadPct}%</span>
              )}
            </div>
          </div>
        )}

        <div className="grid grid-cols-2 gap-3 mb-5">
          {[
            {label:'Upload Work',   sub: uploading ? `${uploadPct}% complete` : 'Add to portfolio', icon: uploading ? null : '📸', action:handleUploadPortfolio},
            {label:'View Bookings', sub:'3 pending',       icon:'📅',action:()=>{}},
            {label:'Edit Profile',  sub:'Update your info',icon:'✏️',action:()=>{}},
            {label:'Earnings',      sub:'View payouts',    icon:'💰',action:()=>{}},
          ].map(a=>(
            <button key={a.label} onClick={a.action}
              disabled={a.label==='Upload Work' && uploading}
              className="rounded-2xl p-4 text-left active:scale-95 transition-all relative overflow-hidden"
              style={{ background: a.label==='Upload Work' && uploading ? 'rgba(255,56,92,0.04)' : '#F9FAFB', border: a.label==='Upload Work' ? '1px solid rgba(255,56,92,0.25)' : '1px solid #E5E7EB' }}>
              {/* Progress fill behind the Upload Work tile */}
              {a.label==='Upload Work' && uploading && (
                <div className="absolute inset-0 transition-all" style={{ width:`${uploadPct}%`, background:'rgba(255,56,92,0.07)', borderRadius:0 }} />
              )}
              <span className="relative text-2xl">
                {a.label==='Upload Work' && uploading
                  ? <span className="inline-block w-7 h-7 rounded-full border-2 border-t-transparent spin" style={{ borderColor:'var(--red)', borderTopColor:'transparent' }} />
                  : a.icon}
              </span>
              <p className="relative font-semibold text-gray-800 text-sm mt-2" style={{ fontFamily:'Syne', color: a.label==='Upload Work' ? 'var(--red)' : undefined }}>{a.label}</p>
              <p className="relative text-xs text-gray-400 mt-0.5">{a.sub}</p>
            </button>
          ))}
        </div>

        {/* My Portfolio — owner grid with Add Photo button */}
        {user && (
          <div className="mb-5">
            <PortfolioGrid providerId={user.uid} initialImages={[]} isOwner={true} />
          </div>
        )}

        {/* ════ SECURITY DASHBOARD ════ */}
        <SecurityDashboard user={user} providerData={dashProviderData} onOpenAuth={setAuthModal} />

        {/* Account section */}
        <h3 className="font-bold text-gray-900 mb-3 mt-5" style={{ fontFamily:'Syne' }}>Account</h3>
        <div className="rounded-2xl overflow-hidden border" style={{ borderColor:'#E5E7EB' }}>
          {(!user ? [
            { label:'Sign In',        action:()=>setAuthModal('login'),  active:false },
            { label:'Create Account', action:()=>setAuthModal('signup'), active:false },
            { label:'Sign Up with Phone', action:()=>setAuthModal('phone'), active:false },
          ] : [
            { label:'✓ Signed in via Firebase', action:()=>{}, active:true },
          ]).concat([
            { label:'Notifications',  action:()=>{}, active:false },
            { label:'Help & Support', action:()=>{}, active:false },
          ]).map((item,i,arr)=>(
            <button key={item.label} onClick={item.action}
              className="w-full px-4 py-3.5 text-left text-sm font-medium flex items-center justify-between"
              style={{ color:item.active?'var(--green)':'#374151', borderBottom:i<arr.length-1?'1px solid #F3F4F6':'none' }}>
              {item.label}
              <span className="text-gray-300">{item.active?'✓':'›'}</span>
            </button>
          ))}
        </div>
        {user && (
          <button onClick={()=>auth.signOut()} className="w-full mt-3 py-3.5 rounded-2xl text-sm font-semibold"
            style={{ color:'var(--red)', background:'rgba(255,56,92,0.06)', border:'1px solid rgba(255,56,92,0.15)' }}>
            Sign Out
          </button>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  BOTTOM NAV
// ════════════════════════════════════════════════════════════
function BottomNav({ activeTab, onChange }) {
  const tabs = [
    {id:'home',label:'Home',I:Icon.Home},{id:'search',label:'Search',I:Icon.Search},
    {id:'map',label:'Map',I:Icon.Map},{id:'profile',label:'Profile',I:Icon.User},
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 z-50 bottom-nav"
      style={{ background:'rgba(255,255,255,0.97)', backdropFilter:'blur(16px)', paddingBottom:'env(safe-area-inset-bottom)' }}>
      <div className="flex">
        {tabs.map(tab => {
          const active = activeTab===tab.id;
          return (
            <button key={tab.id} onClick={()=>onChange(tab.id)} className="flex-1 flex flex-col items-center py-3 gap-0.5 transition-all">
              <tab.I size={22} color={active?'var(--red)':'#9CA3AF'} />
              <span className="text-xs font-semibold mt-0.5" style={{ color:active?'var(--red)':'#9CA3AF', fontFamily:'DM Sans' }}>{tab.label}</span>
              {active && <span className="w-1 h-1 rounded-full" style={{ background:'var(--red)' }} />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  TOP HEADER
// ════════════════════════════════════════════════════════════
function TopHeader({ currentUser }) {
  return (
    <div className="fixed top-0 left-0 right-0 z-40 flex items-center justify-between px-5 py-3"
      style={{ background:'rgba(255,255,255,0.95)', backdropFilter:'blur(16px)',
        borderBottom:'1px solid rgba(0,0,0,0.05)', paddingTop:'calc(env(safe-area-inset-top) + 12px)' }}>
      <div className="flex items-center gap-1">
        <span className="text-xl font-extrabold" style={{ fontFamily:'Syne',color:'var(--red)' }}>Gigs</span>
        <span className="text-xl font-extrabold" style={{ fontFamily:'Syne',color:'#1A1A2E' }}>Court</span>
        <span className="text-lg">⚡</span>
      </div>
      <div className="flex items-center gap-2">
        <div className="relative">
          <button className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background:'#F3F4F6' }}>
            <Icon.Bell size={18} color="#374151" />
          </button>
          <span className="absolute -top-0.5 -right-0.5 w-4 h-4 rounded-full text-white flex items-center justify-center"
            style={{ background:'var(--red)', fontSize:9, fontWeight:700 }}>3</span>
        </div>
        <button className="w-9 h-9 rounded-full overflow-hidden border-2" style={{ borderColor:'var(--red)' }}>
          <img src={currentUser?`https://i.pravatar.cc/36?u=${currentUser.uid}`:'https://i.pravatar.cc/36?img=60'}
            alt="me" className="w-full h-full object-cover" />
        </button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  ROOT APP  — Firestore onSnapshot listener for providers feed
// ════════════════════════════════════════════════════════════
function App() {
  const [tab,             setTab]         = React.useState('home');
  const [viewingProvider, setViewing]     = React.useState(null);
  const [providers,       setProviders]   = React.useState([]);
  const [fbStatus,        setFbStatus]    = React.useState('loading');
  const [likedIds,        setLikedIds]    = React.useState([]);
  const [currentUser,     setCurrentUser] = React.useState(null);

  // Auth observer
  React.useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => setCurrentUser(u));
    return () => unsub();
  }, []);

  // ── LIVE Firestore listener on "providers" collection ──
  // Automatically re-renders when any provider's availability changes.
  React.useEffect(() => {
    setFbStatus('loading');

    let query;
    try {
      // Try ordered query — requires a Firestore index (auto-created)
      query = db.collection('providers').orderBy('createdAt', 'desc');
    } catch(e) {
      query = db.collection('providers');
    }

    const unsub = query.onSnapshot(
      snap => {
        if (snap.empty) {
          console.log('[Firestore] providers collection empty — using mock data');
          setProviders(MOCK_PROVIDERS);
          setFbStatus('fallback');
        } else {
          const docs = snap.docs.map(d => ({
            id: d.id,
            ...d.data(),
            portfolio: d.data().portfolio || [],
          }));
          console.log(`[Firestore] ${docs.length} provider(s) live`);
          setProviders(docs);
          setFbStatus('live');
        }
      },
      err => {
        console.error('[Firestore] onSnapshot error:', err.code, err.message);
        setProviders(MOCK_PROVIDERS);
        setFbStatus(err.code==='permission-denied' ? 'fallback' : 'error');
      }
    );

    return () => unsub();
  }, []);

  function handleLike(id) {
    setLikedIds(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  }

  function handleViewProvider(provider) {
    setViewing(provider);
    window.scrollTo(0, 0);
  }

  if (viewingProvider) {
    return <ProfileDetail provider={viewingProvider} onBack={() => { setViewing(null); window.scrollTo(0,0); }} currentUser={currentUser} />;
  }

  return (
    <div className="max-w-md mx-auto min-h-screen">
      <TopHeader currentUser={currentUser} />
      <div style={{ paddingTop:64 }}>
        {tab==='home'    && <HomeTab    providers={providers} fbStatus={fbStatus} onViewProvider={handleViewProvider} likedIds={likedIds} onLike={handleLike} />}
        {tab==='search'  && <SearchTab  providers={providers} onViewProvider={handleViewProvider} likedIds={likedIds} onLike={handleLike} />}
        {tab==='map'     && <MapTab     providers={providers} onViewProvider={handleViewProvider} />}
        {tab==='profile' && <ProfileTab currentUser={currentUser} />}
      </div>
      <BottomNav activeTab={tab} onChange={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
