                    body: formData

            const preview = document.getElementById('portfolioPreview');
            const saveBtn = document.getElementById('saveProfileBtn');
            const signOutBtn = document.getElementById('signOutBtnProfile');
            const messageDiv = document.getElementById('profileMessage');

            if (uploadBtn && fileInput) {
                uploadBtn.addEventListener('click', () => fileInput.click());
                
                fileInput.addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    messageDiv.textContent = 'Uploading...';
                    messageDiv.style.color = '#FF385C';
                    
                    try {
                        const imageUrl = await uploadToCloudinary(file);
                        
                        if (preview) {
                            preview.innerHTML = `<img src="${imageUrl}" alt="Portfolio">`;
                        }
                        
                        // Save to Firestore immediately
                        if (currentUser) {
                            await saveUserProfile(currentUser.uid, { portfolioUrl: imageUrl });
                            messageDiv.textContent = 'Portfolio uploaded!';
                            messageDiv.style.color = '#00ff88';
                            setTimeout(() => messageDiv.textContent = '', 2000);
                        }
                    } catch (error) {
                        messageDiv.textContent = 'Upload failed: ' + error.message;
                        messageDiv.style.color = '#FF385C';
                    }
                });
            }

            if (saveBtn) {
                saveBtn.addEventListener('click', async () => {
                    if (!currentUser) {
                        overlay.classList.add('show');
                        return;
                    }

                    const displayName = document.getElementById('displayName')?.value || '';
                    const category = document.getElementById('category')?.value || '';
                    const bio = document.getElementById('bio')?.value || '';
                    const hourlyRate = document.getElementById('hourlyRate')?.value || '';

                    const profileUpdate = {
                        displayName,
                        category,
                        bio,
                        hourlyRate: hourlyRate ? parseFloat(hourlyRate) : null,
                        updatedAt: new Date().toISOString()
                    };

                    messageDiv.textContent = 'Saving...';
                    messageDiv.style.color = '#FF385C';

                    const success = await saveUserProfile(currentUser.uid, profileUpdate);
                    
                    if (success) {
                        messageDiv.textContent = 'Profile saved!';
                        messageDiv.style.color = '#00ff88';
                        setTimeout(() => messageDiv.textContent = '', 2000);
                    } else {
                        messageDiv.textContent = 'Error saving profile';
                        messageDiv.style.color = '#FF385C';
                    }
                });
            }

            if (signOutBtn) {
                signOutBtn.addEventListener('click', async () => {
                    try {
                        await signOut(auth);
                    } catch (error) {
                        console.warn('Sign out error:', error);
                    }
                });
            }
        }

        // ---------- BOTTOM NAV ----------
        function setActiveTab(activeId) {
            navItems.forEach(item => {
                const tab = item.dataset.tab;
                if (tab === activeId) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        tabHome.addEventListener('click', (e) => {
            e.preventDefault();
            currentTab = 'home';
            setActiveTab('home');
            renderPanel('home');
        });

        tabSearch.addEventListener('click', (e) => {
            e.preventDefault();
            currentTab = 'search';
            setActiveTab('search');
            renderPanel('search');
        });

        tabMessages.addEventListener('click', (e) => {
            e.preventDefault();
            currentTab = 'messages';
            setActiveTab('messages');
            renderPanel('messages');
        });

        tabProfile.addEventListener('click', (e) => {
            e.preventDefault();
            currentTab = 'profile';
            setActiveTab('profile');
            renderPanel('profile');
        });

        // ---------- AUTH LOGIC ----------
        function showAuthMessage(msg, isError = true) {
            authMessage.innerText = msg;
        }

        function setAuthMode(mode) {
            currentAuthMode = mode;
            if (mode === 'login') {
                authPrimaryBtn.innerText = 'Login';
                authToggleText.innerText = "Don't have an account?";
                authToggleBtn.innerText = 'Sign up';
            } else {
                authPrimaryBtn.innerText = 'Sign up';
                authToggleText.innerText = 'Already have an account?';
                authToggleBtn.innerText = 'Login';
            }
            authMessage.innerText = '';
        }

        authToggleBtn.addEventListener('click', () => {
            setAuthMode(currentAuthMode === 'login' ? 'signup' : 'login');
        });

        authPrimaryBtn.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            const pass = authPassword.value.trim();
            if (!email || !pass) {
                showAuthMessage('fill all fields');
                return;
            }
            try {
                if (currentAuthMode === 'login') {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                }
                overlay.classList.remove('show');
                authEmail.value = ''; 
                authPassword.value = '';
            } catch (error) {
                showAuthMessage(error.message);
            }
        });

        googleBtn.addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
                overlay.classList.remove('show');
            } catch (error) {
                showAuthMessage(error.message);
            }
        });

        closeAuthBtn.addEventListener('click', () => {
            overlay.classList.remove('show');
        });

        window.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.classList.remove('show');
        });

        // Auth state observer
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            
            if (user) {
                overlay.classList.remove('show');
                await loadUserProfile(user.uid);
                if (currentTab === 'profile') {
                    renderPanel('profile');
                }
            } else {
                userProfileData = null;
                if (currentTab === 'profile') {
                    renderPanel('profile');
                }
            }
        });

        // Initialize
        setAuthMode('login');
        setActiveTab('home');
        renderPanel('home');
        overlay.classList.remove('show');
    </script>
</body>
</html>
