<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>GigsCourt · soft premium</title>
    <!-- Firebase SDK (v9 modular) -->
    <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0c0c10;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
        }

        #app {
            width: 100%;
            max-width: 430px;
            background: #121217;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* main scrollable panel */
        #panel {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            background: #121217;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #panel::-webkit-scrollbar {
            display: none;
        }

        /* bottom nav – frosted glass with central compass */
        .bottom-nav {
            background: rgba(18, 18, 23, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 77, 109, 0.2);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0 24px 0;
            margin: 0;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.8);
            z-index: 10;
            position: relative;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #6B6B78;
            font-size: 0.7rem;
            font-weight: 500;
            background: transparent;
            border: none;
            width: 22%;
            padding: 6px 0 4px 0;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-item i {
            font-size: 1.6rem;
            margin-bottom: 3px;
            color: #6B6B78;
        }

        .nav-item.active {
            color: #FF4D6D;
        }
        .nav-item.active i {
            color: #FF4D6D;
            filter: drop-shadow(0 0 8px #FF4D6D);
        }

        /* Central compass button (glowing) */
        .compass-btn {
            position: absolute;
            bottom: 54px;
            left: 50%;
            transform: translateX(-50%);
            width: 64px;
            height: 64px;
            background: #FF4D6D;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px #FF4D6D, 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid rgba(255,255,255,0.2);
            z-index: 20;
            cursor: pointer;
            transition: 0.2s;
        }
        .compass-btn i {
            font-size: 2.2rem;
            color: white;
        }
        .compass-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        /* LANDSCAPE FEED (16:9 cards) */
        .landscape-feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px 16px 30px 16px;
        }
        .landscape-card {
            aspect-ratio: 16/9;
            width: 100%;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            background: #1E1E26;
        }
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 70%, transparent 100%);
            pointer-events: none;
        }
        .card-content {
            position: absolute;
            bottom: 16px;
            left: 20px;
            right: 20px;
            z-index: 2;
        }
        .card-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            line-height: 1.2;
        }
        .card-category {
            font-size: 1rem;
            color: #FF4D6D;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }
        .premium-badge-card {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255,77,109,0.2);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #FF4D6D;
            border: 1px solid #FF4D6D40;
            z-index: 3;
        }
        .premium-badge-card i {
            margin-right: 4px;
        }

        /* SEARCH MAP ENGINE */
        .map-container {
            height: 240px;
            width: 100%;
            background: #1E1E26;
            border-radius: 0 0 28px 28px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        #map {
            height: 100%;
            width: 100%;
            background: #1a1a24;
        }
        .radius-slider-container {
            padding: 24px 20px 16px 20px;
            background: #121217;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            color: #9A9AA5;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        .slider-label span i {
            color: #FF4D6D;
            margin-right: 4px;
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #2A2A33;
            border-radius: 10px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #FF4D6D;
            border-radius: 12px;
            box-shadow: 0 0 15px #FF4D6D;
            border: 2px solid white;
            cursor: pointer;
            margin-top: -8px;
        }
        .nearby-list {
            padding: 0 20px 30px 20px;
        }
        .nearby-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid #26262E;
        }
        .nearby-avatar {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: #1E1E26;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #FF4D6D;
            border: 2px solid #FF4D6D40;
        }
        .nearby-info h4 {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .nearby-info p {
            color: #9A9AA5;
            font-size: 0.85rem;
        }
        .nearby-distance {
            margin-left: auto;
            color: #FF4D6D;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* PROFILE – cinematic cover + 3‑col grid with 2px gap */
        .profile-header {
            position: relative;
            width: 100%;
        }
        .cover-photo {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #1E1E26, #2A2A33);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }
        .cover-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .cover-upload-btn {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid #FF4D6D40;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            z-index: 3;
        }
        .profile-avatar-section {
            position: relative;
            padding: 0 20px;
            margin-top: -40px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            z-index: 5;
        }
        .profile-avatar {
            width: 96px;
            height: 96px;
            border-radius: 48px;
            background: #1E1E26;
            border: 3px solid #FF4D6D;
            box-shadow: 0 0 0 4px #121217, 0 10px 30px rgba(255,77,109,0.6);
            overflow: hidden;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-upload-btn {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid #FF4D6D40;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .profile-stats {
            display: flex;
            gap: 32px;
            padding: 16px 20px;
            border-bottom: 1px solid #26262E;
            background: rgba(22,22,28,0.5);
            backdrop-filter: blur(8px);
            margin-top: 8px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #9A9AA5;
        }

        /* 3‑column grid with 2px gaps (rose accents) */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: #121217;
            padding: 2px 0;
        }
        .grid-item {
            aspect-ratio: 1/1;
            background: #1E1E26;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .grid-item .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,77,109,0.1);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }
        .grid-item:hover .overlay {
            opacity: 1;
        }

        /* messages */
        .inbox-list {
            padding: 0 16px;
        }
        .message-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
            border-bottom: 1px solid #26262E;
        }
        .message-avatar {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: #1E1E26;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #FF4D6D;
            position: relative;
        }
        .notification-dot {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #FF4D6D;
            border-radius: 6px;
            border: 2px solid #121217;
        }
        .message-content { flex:1; }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .message-name { font-weight: 600; }
        .message-time { font-size:0.75rem; color:#9A9AA5; }
        .message-preview {
            color:#9A9AA5; font-size:0.85rem;
            display:flex; align-items:center; gap:4px;
        }

        /* edit profile */
        .edit-profile-form { padding:20px; }
        .form-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
        .form-header h3 { font-size:1.3rem; font-weight:600; }
        .edit-icon { color:#FF4D6D; font-size:1.2rem; }
        .form-group { margin-bottom:20px; }
        .form-group label { color:#9A9AA5; font-size:0.85rem; margin-bottom:8px; display:block; }
        .form-control {
            width:100%; padding:16px 18px; background:#1E1E26;
            border:1px solid #2E2E38; border-radius:28px; color:white;
            font-size:1rem; outline:none; box-shadow:0 8px 20px rgba(0,0,0,0.5);
        }
        .form-control:focus { border-color:#FF4D6D; box-shadow:0 0 0 3px #FF4D6D30; }
        select.form-control {
            appearance:none;
            background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FF4D6D' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat:no-repeat; background-position:right 1rem center;
        }
        .btn {
            background:#FF4D6D; color:white; border:none; border-radius:40px;
            padding:16px 20px; font-weight:600; font-size:1rem; width:100%;
            margin:8px 0; cursor:pointer; box-shadow:0 10px 25px rgba(255,77,109,0.3);
        }
        .btn:active { transform:scale(0.97); }
        .btn-secondary { background:#1E1E26; border:1px solid #2E2E38; }
        .btn-secondary i { color:#FF4D6D; margin-right:8px; }

        /* auth overlay */
        .auth-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.95); backdrop-filter:blur(25px);
            display:flex; align-items:center; justify-content:center;
            z-index:1000; padding:20px; visibility:hidden; opacity:0;
            transition:0.2s;
        }
        .auth-overlay.show { visibility:visible; opacity:1; }
        .auth-card {
            background:#1E1E26; max-width:420px; width:100%;
            border-radius:48px; padding:32px 24px; border:1px solid #2E2E38;
            box-shadow:0 30px 60px rgba(255,77,109,0.3);
        }
        .close-auth { background:none; border:none; color:#fff; font-size:2rem; float:right; cursor:pointer; }
        .input-field {
            background:#121217; border:1px solid #2E2E38; border-radius:40px;
            padding:16px 22px; width:100%; color:white; font-size:1rem; margin:8px 0;
            outline:none;
        }
        .input-field:focus { border-color:#FF4D6D; }
        .text-small { color:#9A9AA5; font-size:0.85rem; }
    </style>
</head>
<body>
    <div id="app">
        <div id="panel"></div>

        <!-- bottom nav with central compass -->
        <div style="position:relative;">
            <div class="bottom-nav" id="bottomNav">
                <button class="nav-item" data-tab="home" id="tabHome"><i class="fas fa-home"></i><span>Home</span></button>
                <button class="nav-item" data-tab="search" id="tabSearch"><i class="fas fa-search"></i><span>Search</span></button>
                <button class="nav-item" data-tab="messages" id="tabMessages"><i class="fas fa-envelope"></i><span>Messages</span></button>
                <button class="nav-item" data-tab="profile" id="tabProfile"><i class="fas fa-user-circle"></i><span>Profile</span></button>
            </div>
            <div class="compass-btn" id="compassBtn"><i class="fas fa-compass"></i></div>
        </div>
    </div>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <button class="close-auth" id="closeAuthBtn">&times;</button>
            <h2 style="color:white;"><i class="fa-regular fa-gem" style="color:#FF4D6D;"></i> GigsCourt</h2>
            <p class="text-small mb-2">soft premium loop</p>
            <div><input type="email" id="authEmail" class="input-field" placeholder="Email"></div>
            <div><input type="password" id="authPassword" class="input-field" placeholder="Password"></div>
            <button class="btn" id="authPrimaryBtn">Login</button>
            <button class="btn btn-secondary" id="googleSignInBtn"><i class="fab fa-google"></i> Continue with Google</button>
            <div style="text-align:center; margin-top:20px;">
                <span id="authToggleText" style="color:#9A9AA5;">Don't have an account?</span>
                <button id="authToggleBtn" style="background:none; border:none; color:#FF4D6D; font-weight:600; cursor:pointer;">Sign up</button>
            </div>
            <p id="authMessage" style="color:#FF4D6D; font-size:0.8rem; margin-top:12px;"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged,
            signOut
        } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
        import {
            getFirestore,
            doc,
            setDoc,
            getDoc
        } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: 'AIzaSyD7dRYpXukVlyV6ipmCfbCXEJ4kp8t1Gmg',
            authDomain: 'gigscourt.firebaseapp.com',
            projectId: 'gigscourt',
            storageBucket: 'gigscourt.firebasestorage.app',
            appId: '1:1055157379736:web:215763c63606c2c5a966ed'
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const CLOUD_NAME = 'dszdwnuua';
        const UPLOAD_PRESET = 'Gigscourt';
        const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

        const panel = document.getElementById('panel');
        const overlay = document.getElementById('authOverlay');
        const closeAuthBtn = document.getElementById('closeAuthBtn');
        const authEmail = document.getElementById('authEmail');
        const authPassword = document.getElementById('authPassword');
        const authPrimaryBtn = document.getElementById('authPrimaryBtn');
        const googleBtn = document.getElementById('googleSignInBtn');
        const authToggleBtn = document.getElementById('authToggleBtn');
        const authToggleText = document.getElementById('authToggleText');
        const authMessage = document.getElementById('authMessage');
        const compassBtn = document.getElementById('compassBtn');

        const tabHome = document.getElementById('tabHome');
        const tabSearch = document.getElementById('tabSearch');
        const tabMessages = document.getElementById('tabMessages');
        const tabProfile = document.getElementById('tabProfile');
        const navItems = [tabHome, tabSearch, tabMessages, tabProfile];

        let currentAuthMode = 'login';
        let currentUser = null;
        let currentTab = 'home';
        let userProfileData = {};
        let mapInitialized = false;
        let map, radiusSlider;

        async function loadUserProfile(uid) {
            try {
                const docRef = doc(db, 'users', uid);
                const docSnap = await getDoc(docRef);
                userProfileData = docSnap.exists() ? docSnap.data() : {};
            } catch (error) {
                console.error('Error loading profile:', error);
                userProfileData = {};
            }
        }

        async function saveUserProfile(uid, profileData) {
            try {
                const docRef = doc(db, 'users', uid);
                await setDoc(docRef, profileData, { merge: true });
                userProfileData = { ...userProfileData, ...profileData };
                return true;
            } catch (error) {
                console.error('Error saving profile:', error);
                return false;
            }
        }

        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const response = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
            const data = await response.json();
            return data.secure_url;
        }

        function initMap() {
            if (!mapInitialized && document.getElementById('map')) {
                map = L.map('map').setView([40.7128, -74.0060], 12);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap, CartoDB',
                    subdomains: 'abcd',
                    maxZoom: 19
                }).addTo(map);
                mapInitialized = true;
            }
        }

        function renderPanel(tabId) {
            if (tabId === 'home') {
                panel.innerHTML = `
                    <div class="landscape-feed">
                        <div class="landscape-card">
                            <img class="card-bg" src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=600&auto=format" alt="talent">
                            <div class="card-gradient"></div>
                            <div class="premium-badge-card"><i class="fas fa-crown"></i> PREMIUM</div>
                            <div class="card-content">
                                <div class="card-name">Aisha Karim</div>
                                <div class="card-category"><i class="fas fa-bolt"></i> Full‑stack · AI</div>
                            </div>
                        </div>
                        <div class="landscape-card">
                            <img class="card-bg" src="https://images.unsplash.com/photo-1560250097-0b93528c311a?w=600&auto=format" alt="talent">
                            <div class="card-gradient"></div>
                            <div class="premium-badge-card"><i class="fas fa-crown"></i> PREMIUM</div>
                            <div class="card-content">
                                <div class="card-name">Marcus V.</div>
                                <div class="card-category"><i class="fas fa-bolt"></i> UX / product</div>
                            </div>
                        </div>
                        <div class="landscape-card">
                            <img class="card-bg" src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f9e?w=600&auto=format" alt="talent">
                            <div class="card-gradient"></div>
                            <div class="premium-badge-card"><i class="fas fa-crown"></i> PREMIUM</div>
                            <div class="card-content">
                                <div class="card-name">Elena Rossi</div>
                                <div class="card-category"><i class="fas fa-bolt"></i> growth marketing</div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (tabId === 'search') {
                panel.innerHTML = `
                    <div class="map-container"><div id="map"></div></div>
                    <div class="radius-slider-container">
                        <div class="slider-label"><span><i class="fas fa-location-dot"></i> radius</span><span id="radiusValue">25 km</span></div>
                        <input type="range" id="radiusSlider" min="0" max="50" value="25" step="1">
                    </div>
                    <div class="nearby-list" id="nearbyList">
                        <div class="nearby-item"><div class="nearby-avatar"><i class="fas fa-user-tie"></i></div><div class="nearby-info"><h4>Aisha Karim</h4><p>Full‑stack · AI</p></div><div class="nearby-distance">2 km</div></div>
                        <div class="nearby-item"><div class="nearby-avatar"><i class="fas fa-laptop-code"></i></div><div class="nearby-info"><h4>Marcus V.</h4><p>UX / product</p></div><div class="nearby-distance">5 km</div></div>
                        <div class="nearby-item"><div class="nearby-avatar"><i class="fas fa-megaphone"></i></div><div class="nearby-info"><h4>Elena Rossi</h4><p>growth marketing</p></div><div class="nearby-distance">12 km</div></div>
                        <div class="nearby-item"><div class="nearby-avatar"><i class="fas fa-code"></i></div><div class="nearby-info"><h4>Reyansh I.</h4><p>react · node</p></div><div class="nearby-distance">18 km</div></div>
                    </div>
                `;
                setTimeout(() => {
                    initMap();
                    const slider = document.getElementById('radiusSlider');
                    const valSpan = document.getElementById('radiusValue');
                    if (slider) {
                        slider.addEventListener('input', (e) => {
                            valSpan.innerText = e.target.value + ' km';
                        });
                    }
                }, 50);
            } else if (tabId === 'messages') {
                panel.innerHTML = `
                    <div class="inbox-list">
                        <div class="message-item"><div class="message-avatar"><i class="fas fa-user-circle"></i><span class="notification-dot"></span></div><div class="message-content"><div class="message-header"><span class="message-name">Alex Rivera</span><span class="message-time">2h ago</span></div><div class="message-preview"><i class="fas fa-circle" style="color:#FF4D6D; font-size:6px;"></i> RE: proposal · Looking forward</div></div></div>
                        <div class="message-item"><div class="message-avatar"><i class="fas fa-user-circle"></i></div><div class="message-content"><div class="message-header"><span class="message-name">Talent team</span><span class="message-time">5h ago</span></div><div class="message-preview">welcome to gigscourt · Complete your profile</div></div></div>
                        <div class="message-item"><div class="message-avatar"><i class="fas fa-user-circle"></i><span class="notification-dot"></span></div><div class="message-content"><div class="message-header"><span class="message-name">Support</span><span class="message-time">1d ago</span></div><div class="message-preview">your verification ✅ · Account verified</div></div></div>
                    </div>
                `;
            } else if (tabId === 'profile') {
                if (currentUser) {
                    loadUserProfile(currentUser.uid).then(() => renderProfileEditor());
                    renderProfileEditor();
                } else {
                    panel.innerHTML = `<div style="padding:40px; text-align:center;"><i class="fas fa-user-circle" style="font-size:5rem; color:#FF4D6D40;"></i><h3 style="margin:20px 0;">sign in</h3><button class="btn" id="showAuthFromProfile">Login / Sign up</button></div>`;
                    document.getElementById('showAuthFromProfile')?.addEventListener('click',()=> overlay.classList.add('show'));
                }
            }
        }

        function renderProfileEditor() {
            const data = userProfileData || {};
            panel.innerHTML = `
                <div class="profile-header">
                    <div class="cover-photo" id="coverPreview">${data.coverUrl ? `<img src="${data.coverUrl}">` : ''}<input type="file" id="coverUpload" accept="image/*" style="display:none;"><div class="cover-upload-btn" id="uploadCoverBtn"><i class="fas fa-camera"></i></div></div>
                    <div class="profile-avatar-section">
                        <div class="profile-avatar" id="avatarPreview">${data.avatarUrl ? `<img src="${data.avatarUrl}">` : '<i class="fas fa-user" style="font-size:3rem; line-height:96px; width:100%; text-align:center; color:#FF4D6D;"></i>'}</div>
                        <input type="file" id="avatarUpload" accept="image/*" style="display:none;"><div class="avatar-upload-btn" id="uploadAvatarBtn"><i class="fas fa-camera"></i></div>
                        <div class="premium-badge-card" style="position:static; margin-bottom:8px;"><i class="fas fa-crown"></i> PREMIUM</div>
                    </div>
                    <div class="profile-stats"><div class="stat-item"><div class="stat-value">48</div><div class="stat-label">gigs</div></div><div class="stat-item"><div class="stat-value">12</div><div class="stat-label">clients</div></div><div class="stat-item"><div class="stat-value">4.9</div><div class="stat-label">rating</div></div></div>
                </div>
                <div class="edit-profile-form">
                    <div class="form-header"><h3>Edit Profile <i class="fas fa-pen edit-icon"></i></h3></div>
                    <div class="form-group"><label>Display Name</label><input type="text" id="displayName" class="form-control" value="${data.displayName || ''}"></div>
                    <div class="form-group"><label>Category</label><select id="category" class="form-control"><option value="Music">Music</option><option value="Tech">Tech</option><option value="Events">Events</option><option value="Design">Design</option><option value="Consulting">Consulting</option></select></div>
                    <div class="form-group"><label>Bio</label><textarea id="bio" class="form-control">${data.bio || ''}</textarea></div>
                    <div class="form-group"><label>Hourly Rate ($)</label><input type="number" id="hourlyRate" class="form-control" value="${data.hourlyRate || ''}"></div>
                    <div class="portfolio-grid" id="portfolioGrid">
                        ${[1,2,3,4,5,6].map(i => `<div class="grid-item" data-index="${i-1}">${data[`portfolio_${i-1}`] ? `<img src="${data[`portfolio_${i-1}`]}">` : ''}<input type="file" class="portfolio-upload" data-index="${i-1}" accept="image/*" style="display:none;"><div class="overlay"><i class="fas fa-plus"></i></div></div>`).join('')}
                    </div>
                    <button class="btn" id="saveProfileBtn">Save Profile</button>
                    <button class="btn btn-secondary" id="signOutBtnProfile"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
                    <div id="profileMessage" style="text-align:center; margin-top:12px;"></div>
                </div>
            `;

            document.getElementById('uploadCoverBtn')?.addEventListener('click', ()=>document.getElementById('coverUpload')?.click());
            document.getElementById('uploadAvatarBtn')?.addEventListener('click', ()=>document.getElementById('avatarUpload')?.click());
            document.getElementById('coverUpload')?.addEventListener('change', async (e) => {
                const file = e.target.files?.[0]; if(!file||!currentUser) return;
                const url = await uploadToCloudinary(file); await saveUserProfile(currentUser.uid,{coverUrl:url});
                document.getElementById('coverPreview').innerHTML = `<img src="${url}"><input type="file" id="coverUpload" accept="image/*" style="display:none;"><div class="cover-upload-btn" id="uploadCoverBtn"><i class="fas fa-camera"></i></div>`;
            });
            document.getElementById('avatarUpload')?.addEventListener('change', async (e) => {
                const file = e.target.files?.[0]; if(!file||!currentUser) return;
                const url = await uploadToCloudinary(file); await saveUserProfile(currentUser.uid,{avatarUrl:url});
                document.getElementById('avatarPreview').innerHTML = `<img src="${url}">`;
            });
            document.querySelectorAll('.grid-item').forEach(item => item.addEventListener('click', ()=> item.querySelector('.portfolio-upload')?.click()));
            document.querySelectorAll('.portfolio-upload').forEach(input => input.addEventListener('change', async (e) => {
                const file = e.target.files?.[0]; const idx = input.dataset.index; if(!file||!currentUser) return;
                const url = await uploadToCloudinary(file); await saveUserProfile(currentUser.uid,{[`portfolio_${idx}`]:url});
                const gridItem = input.closest('.grid-item');
                if(gridItem) gridItem.innerHTML = `<img src="${url}"><input type="file" class="portfolio-upload" data-index="${idx}" accept="image/*" style="display:none;"><div class="overlay"><i class="fas fa-plus"></i></div>`;
            }));
            document.getElementById('saveProfileBtn')?.addEventListener('click', async ()=>{
                if(!currentUser) return;
                const updates = {displayName: document.getElementById('displayName')?.value, category: document.getElementById('category')?.value, bio: document.getElementById('bio')?.value, hourlyRate: parseFloat(document.getElementById('hourlyRate')?.value)||null, updatedAt: new Date().toISOString()};
                const ok = await saveUserProfile(currentUser.uid, updates);
                const msg = document.getElementById('profileMessage');
                if(ok) { msg.innerHTML='Saved!'; msg.style.color='#00ff88'; setTimeout(()=>msg.innerHTML='',2000); }
            });
            document.getElementById('signOutBtnProfile')?.addEventListener('click', async ()=>{ try{ await signOut(auth); }catch(e){}});
        }

        function setActiveTab(activeId) {
            navItems.forEach(item => { if(item.dataset.tab===activeId) item.classList.add('active'); else item.classList.remove('active'); });
        }

        tabHome.addEventListener('click', (e) => { e.preventDefault(); currentTab='home'; setActiveTab('home'); renderPanel('home'); });
        tabSearch.addEventListener('click', (e) => { e.preventDefault(); currentTab='search'; setActiveTab('search'); renderPanel('search'); });
        tabMessages.addEventListener('click', (e) => { e.preventDefault(); currentTab='messages'; setActiveTab('messages'); renderPanel('messages'); });
        tabProfile.addEventListener('click', (e) => { e.preventDefault(); currentTab='profile'; setActiveTab('profile'); renderPanel('profile'); });
        compassBtn.addEventListener('click', () => { currentTab='home'; setActiveTab('home'); renderPanel('home'); });

        function setAuthMode(mode) {
            currentAuthMode = mode; authPrimaryBtn.innerText = mode==='login'? 'Login' : 'Sign up';
            authToggleText.innerText = mode==='login'? "Don't have an account?" : 'Already have an account?';
            authToggleBtn.innerText = mode==='login'? 'Sign up' : 'Login';
        }
        authToggleBtn.addEventListener('click', ()=> setAuthMode(currentAuthMode==='login'? 'signup':'login'));
        authPrimaryBtn.addEventListener('click', async ()=>{
            const email = authEmail.value.trim(), pass = authPassword.value.trim();
            if(!email||!pass) { authMessage.innerText='fill all fields'; return; }
            try {
                if(currentAuthMode==='login') await signInWithEmailAndPassword(auth,email,pass);
                else await createUserWithEmailAndPassword(auth,email,pass);
                overlay.classList.remove('show'); authEmail.value=''; authPassword.value='';
            } catch(error) { authMessage.innerText=error.message; }
        });
        googleBtn.addEventListener('click', async ()=>{
            try{ await signInWithPopup(auth,provider); overlay.classList.remove('show'); }catch(error){ authMessage.innerText=error.message; }
        });
        closeAuthBtn.addEventListener('click', ()=> overlay.classList.remove('show'));
        window.addEventListener('click', (e)=> { if(e.target===overlay) overlay.classList.remove('show'); });

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if(user) { overlay.classList.remove('show'); await loadUserProfile(user.uid); if(currentTab==='profile') renderPanel('profile'); }
            else { userProfileData={}; if(currentTab==='profile') renderPanel('profile'); }
        });

        setAuthMode('login'); setActiveTab('home'); renderPanel('home'); overlay.classList.remove('show');
    </script>
</body>
</html>
